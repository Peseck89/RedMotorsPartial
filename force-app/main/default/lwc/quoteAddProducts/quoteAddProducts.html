<template if:true={screenZero}>
<lightning-card>
    
    <b style="color: #000000;;margin-left: 12px;"> Monto del Presupuesto:
        <b style="color: #193a96;;margin-left: 12px;"><lightning-formatted-number currency-code={currencyCode} format-style="currency" value={montoTotal}></lightning-formatted-number>

        <div   class="slds-float--right" style="padding: 10px;" >
          <lightning-button-group>

                ></lightning-button>
                
                <lightning-button if:false={showBetaStuff} label="Guardar"

                ></lightning-button>

        <!--<b if:true={showMoveLines} style="color: #087508;;margin-left: 12px;"> Orden de líneas</b>--><br/>

                            type="text"
                            placeholder="Buscar trabajo..."

                            oninput={handleSearchTrabajoChange}

                        />

                        <template if:true={searchTrabajoResults}>
                            <ul class="slds-listbox slds-listbox_vertical slds-dropdown slds-dropdown_fluid"
                                role="listbox"
                                style="position: absolute; z-index: 2; width: 100%;">
                                <template for:each={searchTrabajoResults} for:item="trabajo">
                                    <li key={trabajo.Id} data-id={trabajo.Id} role="presentation" onclick={handleSelectTrabajo}>

            </lightning-button-group>
        </div>
        <div   class="slds-float--right" style="padding: 10px;" >
            <lightning-button-group>
               
               <!-- <template if:true={showDelete}>
                <lightning-button label="Delete"
                variant="destructive" 
                onclick={handleDeleteLine}
                icon-name="utility:delete"
                ></lightning-button>
            </template>
                <lightning-button  label="Agregar Línea" 
                variant="brand-outline"
                onclick={handleSearch}
                icon-name="utility:add"

                ></lightning-button>
                  <lightning-button label="Trabajo a Realizar" 
                variant="brand-outline"
                disabled={tareaNoSeleccionada}
                onclick={handleGetTrabajos}
                icon-name="utility:page"
                ></lightning-button>-->
                <div class="toolbar-row">
                Prioridad
                <select id="miPicklistPrioridad" disabled={tareaNoSeleccionada} class={prioridadClass} onchange={handlePrioridadChangeUno}>
                    <option value="Necesario">Necesario</option>
                    <option value="Sugerido">Sugerido</option>
                    <option value="Recomendado">Recomendado</option>
                </select>
                Tipo de Cargo
                <lightning-combobox
                      class="inline-pick"
                  disabled={tareaNoSeleccionada}
                  value={selectedTipoCargoTop}
                  options={tipoCargoOptions}

                  label="Tipo de cargo"
                  onchange={handleTipoCargoChangeUno}>
                </lightning-combobox>
                Aprobador
                <lightning-combobox
                      class="inline-pick"
                  disabled={tareaNoSeleccionada}
                  value={selectedAprobadorTop}
                  options={aprobadorOptions}
                  variant="label-hidden"
                  label="Tipo de cargo"
                  onchange={handleAprobadorChangeUno}>
                </lightning-combobox>
                <!--<lightning-button label="Búsqueda Detallada"
                variant="brand-outline" 
                onclick={handleShowSearch}
                ></lightning-button>
                  <lightning-button label="Archivar Tarea"
                variant="brand-outline" 
                onclick={handleShowSearch}
                ></lightning-button>-->
                <lightning-button label="Agregar Tarea" 
                disabled={tareaNoSeleccionada}
                variant="brand"
                onclick={handleAddTarea}
                icon-name="utility:add"
                ></lightning-button>
                </div>
            </lightning-button-group>
            </div>
            <div if:true={showMoveLines2}   class="slds-float--left" style="padding: 10px;" >
                <lightning-button-group>
                    <lightning-button 
                    variant="brand-outline"
                    onclick={handleMoveTop}
                    icon-name="utility:arrow_top"
    
                    ></lightning-button>
                    <lightning-button 
                    variant="brand-outline"
                    onclick={handleMoveUp}
                    icon-name="utility:arrowup"
    
                    ></lightning-button>
                    <lightning-button 
                    variant="brand-outline"
                    onclick={handleMoveDown}
                    icon-name="utility:arrowdown"
                    ></lightning-button>
                    <lightning-button

</lightning-card>

<template if:true={isLoaded}>
  <lightning-spinner
    alternative-text="Procesando..."
    size="large"
    class="slds-is-fixed">
  </lightning-spinner>
</template>

<br><br><br>
<!-- ======== SECCIONES POR TAREA ======== -->
 <template if:true={taskGroups}>
  <template for:each={taskGroups} for:item="grp">
    <section key={grp.key} class="slds-m-vertical_medium">

      <!-- Barra por Tarea (usa el key y nombre) -->
      <div class="slds-grid slds-wrap slds-p-vertical_x-small slds-border_bottom">
        <!-- Columna izquierda: botón colapsar/expandir + título -->
        <!-- Botón colapsar/expandir -->
        <div class="slds-col slds-size_1-of-4 slds-grid slds-grid_vertical-align-center slds-p-left_small">
          <template if:true={grp.isCollapsed}>
            <lightning-button-icon
              class="slds-m-right_small"
              data-task={grp.key}
              onclick={toggleGroup}
              alternative-text="Expandir tarea"
              icon-name="utility:chevronright">
            </lightning-button-icon>
          </template>
          <template if:false={grp.isCollapsed}>
            <lightning-button-icon
              class="slds-m-right_small"
              data-task={grp.key}
              onclick={toggleGroup}
              alternative-text="Colapsar tarea"
              icon-name="utility:chevrondown">
            </lightning-button-icon>
          </template>

          <span class="slds-text-title_bold">Tarea:</span>
          <span class="slds-m-left_small slds-text-heading_small">{grp.name}</span>
        </div>
        <div class="slds-col slds-size_2-of-4 slds-text-align_right slds-p-right_small">
          <span class="slds-m-right_large slds-text-title">
          Monto de la tarea:
          <strong>
            {grp.currencyCode}
            <lightning-formatted-number
              value={grp.totalAmount}
              maximum-fraction-digits="2">
            </lightning-formatted-number>
          </strong>
        </span>
        <span class="slds-text-title">
          Cantidad: <strong>{grp.lineCount}</strong>
        </span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        <span class="slds-text-title">
          Estado de Aprobación:&nbsp;&nbsp;
          <span class={grp.estadoAprobacionClass}>{grp.estadoAprobacion}</span>
        </span>
        </div>
                <div class="slds-col slds-size_1-of-4 slds-text-align_right slds-p-right_small">
        </div>
        </div>
        <template if:false={grp.isCollapsed}>
        <div class="slds-grid slds-wrap slds-p-vertical_x-small slds-border_bottom">
          
        <div class="slds-col slds-size_4-of-4 slds-p-right_small task-actions">
          Prioridad
          <select
            key={grp.key}
            class={grp.prioridadClass}
            value={grp.prioridad}
            data-task={grp.key}
            onchange={handlePrioridadChangeDos}
            disabled={grp.isDefaultMostrador}
          >
            <option value="Necesario"   selected={grp.prioridadIsNecesario}>Necesario</option>
            <option value="Sugerido"    selected={grp.prioridadIsSugerido}>Sugerido</option>
            <option value="Recomendado" selected={grp.prioridadIsRecomendado}>Recomendado</option>
          </select>
          Tipo de Cargo
          <lightning-combobox
              class="slds-m-left_x-small inline-pick"
            data-task={grp.key}
            value={grp.tipoCargo}
            options={tipoCargoOptions}
            variant="label-hidden"
            label="Tipo de cargo"
            onchange={handleTipoCargoChangeDos}
            disabled={grp.isDefaultMostrador}>
          </lightning-combobox>
          Aprobador
          <lightning-combobox
            class="slds-m-left_x-small inline-pick"
            data-task={grp.key}
            value={grp.aprobador}
            options={aprobadorOptions}
            variant="label-hidden"
            label="Aprobador"
            onchange={handleAprobadorChangeDos}
            disabled={grp.isDefaultMostrador}>
          </lightning-combobox>
          <lightning-button label="+ Agregar Línea" data-task={grp.key}
                            onclick={handleAddLineByTask} class="slds-m-left_x-small"></lightning-button>
          <lightning-button
            label="Eliminar líneas" 
            disabled={disableDeleteButton}
            data-task={grp.key}
            onclick={handleDeleteLinesByTask}
            class="slds-m-left_x-small">
          </lightning-button>
          <lightning-button label="Búsqueda Detallada" data-task={grp.key}
                            onclick={handleAdvancedSearchByTask} class="slds-m-left_x-small"></lightning-button>
          <!--<lightning-button label="Trabajo a Realizar" data-task={grp.key}
                            onclick={handleGetTrabajosByTask} class="slds-m-left_x-small"></lightning-button>-->
          <lightning-button label="Archivar Tarea" data-task={grp.key}
                            onclick={handleArchivarTarea} class="slds-m-left_x-small"></lightning-button>
          <lightning-button variant="brand" label="Guardar Tarea" data-task={grp.key}
                            onclick={handleSave} class="slds-m-left_x-small"></lightning-button>
        </div>
        </div>

  </template>

      <!-- SOLO muestra la tabla si NO está colapsado -->
    <template if:false={grp.isCollapsed}>

        <table class="slds-table_cell-buffer slds-table_bordered slds-table_col-bordered slds-m-top_small">
          <thead>
            <tr>
              <th scope="col">*</th>
              <th scope="col">Código</th>
              <th scope="col">Producto</th>
              <th scope="col">Bodega</th>
              <th scope="col">Trabajo</th>
              <th scope="col">Precio Unitario</th>
              <th scope="col">Precio Venta</th>
              <th scope="col">Disponible real</th>
              <th scope="col">Tipo</th>
              <th scope="col" style="width: 150px;">Alias</th>
              <!--<th scope="col">Estado Aprobación</th>-->
              <th scope="col">Cantidad</th>
            </tr>
          </thead>
          <tbody>
            <!-- (Opcional) fila de búsqueda -->
            <template if:true={hasSearchRow}>
              <tr data-id="search">
                <td></td>
                <td>
                  <lightning-input data-id="search" name="code" type="text"
                    placeholder="Código de Producto" value={searchRow.ProductCode}
                    onblur={handleSearchText} variant="label-hidden"
                    style="color:rgb(75, 75, 75);">
                  </lightning-input>
                </td>
                <td colspan="8"></td>
              </tr>
            </template>
             <template for:each={grp.items} for:item="item" for:index="indexVar">
            <tr key={item.ID} data-id={item.ID} data-isclosed={item.isClosed}>
              <td data-label="select">
                <lightning-input if:true={item.CanDeleteWolis__c}
                                 type="checkbox"
                                 name="chackInput"
                                 label="checkbox"
                                 variant="label-hidden"
                                 checked={item.isChecked}
                                 data-id={item.ID}
                                 onchange={handlecheck}
                                 disabled={item.isClosed}>
                </lightning-input>
              </td>

              <td class="cell-wrap" if:false={item.isSearch} data-label="Product">{item.ProductCode}</td>

              <td class="cell-wrap" data-label="Name">{item.Name}</td>

              <td  class="cell-wrap" data-label="Bodega" style="font-weight: 900;">
                <lightning-combobox
                    style="color:rgb(0, 0, 0);text-align: left;font-weight: 900;"
                    name="location"
                    variant="label-hidden"
                    label="Bodega"
                    data-id={item.ID}
                    data-status={item.validated}
                    value={item.Bodega}
                    options={item.locations}
                    onchange={handleBodegaSelect}
                    disabled={item.disableBodega}>
                </lightning-combobox>
              </td>
              <td class="cell-wrap" data-label="Trabajo">
                <template if:true={item.renderTrabajoLookup}>
                  <c-lookup
                    data-id={item.ID}
                    id="TipoDeTrabajoRow"
                    placeholder="Buscar trabajo..."
                    selection={item.selectedTrabajoRow}
                    onsearch={handleLookupsearch}
                    onselectionchange={handleRowTrabajoSelectionChange}>
                  </c-lookup>
                </template>
                <template if:false={item.renderTrabajoLookup}>
                  <span>{item.trabajoARealizarName}</span>
                </template>
              </td>
              <td class="cell-wrap" data-label="Precio">
                {item.currencyCode}
                <lightning-formatted-number value={item.precio} maximum-fraction-digits="2"></lightning-formatted-number>
              </td>

              <td class="cell-wrap" data-label="PrecioModificar">
                <lightning-input type="number"
                                 min="0"
                                 step=".0001"
                                 data-id={item.ID}
                                 name="PrecioUnitario"
                                 variant="label-hidden"
                                 label="Enter a number"
                                 onchange={handleSalePrice}
                                 value={item.unitPrice}
                                 style="color:rgb(75, 75, 75);"
                                 disabled={item.canEditSalesPrice}>
                </lightning-input>
              </td>

              <td class="cell-wrap" data-status={item.validated} data-label="DisponibleReal">{item.cantidadDisponible}</td>
              <td class="cell-wrap" data-label="Tipo">{item.productType}</td>

              <td class="cell-wrap" data-label="Alias">
                <lightning-input data-id={item.ID}
                                 name="alias"
                                 type="text"
                                 placeholder="Alias"
                                 value={item.alias}
                                 onchange={handleAlias}
                                 variant="label-hidden"
                                 style="color:rgb(75, 75, 75);"
                                 disabled={item.disableAlias}>
                </lightning-input>
              </td>
              <!--<td data-label="Estado Aprobación">
                <span class={item.estadoAprobacionClass}>{item.estadoAprobacion}</span>
              </td>-->
              <td class="cell-wrap" if:true={item.isMO} data-label="Cantidad">
                <lightning-input type="number"
                                 data-id={item.ID}
                                 name="cantidad"
                                 variant="label-hidden"
                                 min="0.01"
                                 step=".0001"
                                 onchange={handleQuantity}
                                 message-when-range-overflow="No hay la cantidad disponible"
                                 message-when-range-underflow="La cantidad no puede ser menor a 0"
                                 value={item.cantidad}
                                 style="color:rgb(75, 75, 75);"
                                 disabled={item.disableQuantity}> 
                </lightning-input>
              </td>

              <td class="cell-wrap" if:false={item.isMO} data-label="Cantidad">
                <lightning-input type="number"
                                 data-id={item.ID}
                                 name="cantidad"
                                 variant="label-hidden"
                                 min="0.01"
                                 step=".0001"
                                 onchange={handleQuantity}
                                 message-when-range-overflow="No hay la cantidad disponible"
                                 message-when-range-underflow="La cantidad no puede ser menor a 0"
                                 value={item.cantidad}
                                 style="color:rgb(75, 75, 75);"
                                 disabled={item.disableQuantity}>
                </lightning-input>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
      </template>
    </section>
  </template>
  <br>
  <div class="slds-grid slds-grid_align-end slds-m-top_large">
  <lightning-button variant="neutral" label="Nuevo tipo de trabajo" onclick={handleCrearNT} class="slds-var-m-right_small"></lightning-button>
</div>
</template>
<template if:true={showArchiveModal}>
  <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
    <div class="slds-modal__container slds-modal_small compact-modal">
      <div class="slds-modal__content slds-p-around_small" style="text-align:center;">
        <p class="slds-m-bottom_small">Seleccione una opción:</p>
        <div class="slds-button-group" role="group">
          <lightning-button label="Archivar" onclick={handleArchiveOnly}
                            class="slds-m-horizontal_x-small"></lightning-button>
          <lightning-button label="Archivar con recordatorio" onclick={handleArchiveWithReminder}
                            class="slds-m-horizontal_x-small"></lightning-button>
          <lightning-button label="Cancelar" onclick={handleCancelArchive}
                            class="slds-m-horizontal_x-small"></lightning-button>
        </div>
      </div>
    </div>
  </section>
  <div class="slds-backdrop slds-backdrop_open"></div>
</template>
<template if:true={showModal}>
    <!-- Modal/Popup Box LWC starts here -->
    <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
        <div class="modal__custom" style="width: 80%;" >
            <!-- Modal/Popup Box LWC header here -->
            <header class="slds-modal__header">
                <h1 if:true={showReserveWarning} id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate" style="padding-left: 20px;padding-right: 20px;"><b>ADVERTENCIA:</b></h1>
                <h1 if:true={showPreview} id="modal-heading-02" class="slds-text-heading_medium slds-hyphenate" style="padding-left: 20px;padding-right: 20px;">Los siguientes artículos no poseen existencias en la localización seleccionada, <b>para facturar el pedido valide las existencias entre bodegas o realice la solicitud de un pedido especial.</b></h1>
            </header>
            <!-- Modal/Popup Box LWC body starts here -->
            <div class="slds-modal__content slds-p-around_medium" style="text-align: center;">
                <p><b if:true={showReserveWarning} style="font-size: 15px;">Los siguientes artículos no poseen existencias en la localización seleccionada,para facturar el pedido valide las existencias entre bodegas o realice la solicitud de un pedido especial.
                </b></p>
                <div class="slds-table_col-bordered slds-table_bordered" style="max-height: 450px">
                    <lightning-datatable 
                        show-row-number-column
                        row-number-offset={rowOffset}
                        hide-checkbox-column
                        data={specialOrders} 
                        columns={cols} key-field="ID">
                    </lightning-datatable>
                </div>

            </div>
            <!-- Modal/Popup Box LWC footer starts here -->
            <footer class="slds-modal__footer" style="text-align: center;">
                <button if:false={showPreview} class="slds-button slds-button_destructive" onclick={closeReservar} title="Cancel">Cancelar</button> 
                <button if:true={showReserveWarning} class="slds-button slds-button_brand" onclick={handleSaveOnline} title="OK">¡Reservar!</button>
                <button if:true={showPreview} class="slds-button  slds-button_brand" onclick={closeReservar} title="Cancel">OK</button>
            </footer>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open" style="opacity: 0.8;top: 5.7%;height: 800px;border-radius: 4px;"></div>

</template>
</template>
<template if:true={firstScreen}>
<lightning-card title="Trabajos a Realizar" icon-name="standard:work_type">
<template if:true={isLoading}>
  <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
</template> 
<div class="slds-m-around_medium">
  <div class="slds-m-bottom_medium header-but-content">
    <lightning-button label="Atrás" title="Atrás" onclick={handleCancelar} class="slds-m-left_x-small"></lightning-button>&nbsp;&nbsp;
    <lightning-button label="+" variant="brand" onclick={handleAddWork} disabled={disabeldTrabajosButton}>
    </lightning-button>
  </div>
  <table class="custom-table">
    <thead>
      <tr class="custom-table-tr">
        <th>Prioridad</th>
        <th>Trabajo a Realizar</th>
        <th>Tipo de Cargo</th>
        <th>Aprobador</th>
        <th>Alias</th>
        <template if:true={showWorkOrderCombo}>
          <th>Orden</th>
        </template>
        <th>Guardar</th>
        <th style="width: 100px; max-width: 100px;">Horas</th>
        <th style="width: 100px; max-width: 100px;">UTS</th>
        <th>Subtrabajos</th>
        <th>Borrar</th>
      </tr>
    </thead>
    <tbody>
      <template for:each={trabajos} for:item="trabajo">
        <tr key={trabajo.id} class="slds-hint-parent custom-td">
          <td class="custom-td">
            <lightning-combobox style="margin-top: -15px;" value={trabajo.prioridad} options={prioridadOptions}
              data-id={trabajo.id} onchange={handlePrioridadChange}>
            </lightning-combobox>
          </td>
          <td class="custom-td">
            <template if:true={trabajo.nombreTrabajo}>
              <c-lookup 
              selection={trabajo.selectedTrabajo} 
              onsearch={handleLookupsearch}
              onselectionchange={handleTipoTrabajoLookupSelectionChange} 
              id="TipoDeTrabajo"
              data-id={trabajo.id}
              required>
            </c-lookup>
            </template>
            <template if:false={trabajo.nombreTrabajo}>
              <c-lookup 
              onsearch={handleLookupsearch}
              onselectionchange={handleTipoTrabajoLookupSelectionChange} 
              id="TipoDeTrabajo2"
              data-id={trabajo.id} 
              required>
            </c-lookup>
            </template>
          </td>
          <td class="custom-td">
            <lightning-combobox style="margin-top: -15px;" value={trabajo.tipoCargo} options={tipoCargoOptions}
              data-id={trabajo.id} onchange={handleTipoCargoChange}>
            </lightning-combobox>
          </td>
          <td class="custom-td">
            <lightning-combobox style="margin-top: -15px;" value={trabajo.aprobador} options={aprobadorOptions}
              data-id={trabajo.id} onchange={handleAprobadorChange}>
            </lightning-combobox> 
          </td>
          <td class="custom-td">
            <lightning-input style="margin-top: -15px;" 
                            class="test" 
                            type="text" 
                            value={trabajo.alias}
                            data-id={trabajo.id} 
                            onchange={handleAliasChange}>
            </lightning-input>
        </td>
          <template if:true={showWorkOrderCombo}>
            <td>
            <lightning-combobox style="margin-top: -15px;"
                value={trabajo.workOrderId} options={workOrdersOptions} disabled={trabajo.disabledWorkOrder}  data-id={trabajo.id}
                onchange={handleOrdenSelection}>
            </lightning-combobox>
            </td>
        </template>
          <td>
            <lightning-button label="+" variant="brand" onclick={handleSaveOne} data-id={trabajo.id} class="slds-m-left_small"></lightning-button>
          </td>
          <td style="width: 100px; max-width: 100px;">
            <lightning-input style="margin-top: -15px;" class="test"  disabled={trabajo.disabledUts}  type="decimal" value={trabajo.uts}
              data-id={trabajo.id} onchange={handleUTSChange}>
            </lightning-input>
          </td>
            <td style="width: 100px; max-width: 100px;">
            <lightning-input 
              style="margin-top: -15px;" 
              class="test" 
              disabled={trabajo.disabledUts} 
              type="number" 
              min="0"
              step="1"
              value={trabajo.utsReal}
              data-id={trabajo.id} 
              onchange={handleUTSRealChange}>
          </lightning-input>
          </td>
          <td>
            <lightning-button label={trabajo.subtrabajos.length} variant="neutral" icon-name="utility:right"
              onclick={handleOpenSubtrabajos} data-id={trabajo.id}  disabled={trabajo.isButtonDisabled}>
            </lightning-button>
          </td>
          <td>
            <lightning-button-icon icon-name="utility:delete" variant="bare" alternative-text="Eliminar"
              data-id={trabajo.id} onclick={handleDeleteTrabajo}>
            </lightning-button-icon>
          </td>
        </tr>
        <template if:true={trabajo.mostrarAseguradora}>
          <tr key={trabajo.idAseguradora} class="slds-hint-parent custom-td">
            <td colspan="3"></td>
            <td colspan="2">
              <template if:true={trabajo.aseguradora}>
                <c-lookup
                  selection={trabajo.selectedAseguradora} 
                  onsearch={handleLookupsearch}
                  id="Aseguradora"
                  onselectionchange={handleLookupAseguradoraChange} 
                  label="Aseguradora"
                  data-id={trabajo.id}>
                </c-lookup>
              </template>
              <template if:false={trabajo.aseguradora}>
                <c-lookup
                  onsearch={handleLookupsearch}
                  id="Aseguradora2"
                  onselectionchange={handleLookupAseguradoraChange} 
                  label="Aseguradora"
                  data-id={trabajo.id}>
                </c-lookup>
              </template>
            </td>
            <td colspan="4"></td>
          </tr>
        </template>
        <template if:true={trabajo.mostrarCentroDeCostos}>
          <tr key={trabajo.idCentroDeCostos} class="slds-hint-parent custom-td">
            <td colspan="3"></td>
            <td colspan="2">
              <template if:true={trabajo.centroDeCostos}>
                <c-lookup
                  selection={trabajo.selectedCentroDeCostos} 
                  onsearch={handleLookupsearch}
                  id="CentroCosto"
                  onselectionchange={handleLookupCentroDeCostosChange} 
                  label="Centro de costos"
                  data-id={trabajo.id}>
                </c-lookup>
              </template>
              <template if:false={trabajo.centroDeCostos}>
                <c-lookup
                  onsearch={handleLookupsearch}
                  id="CentroCosto2"
                  onselectionchange={handleLookupCentroDeCostosChange} 
                  label="Centro de costos"
                  data-id={trabajo.id}>
                </c-lookup>
              </template>
            </td>
            <td colspan="4"></td>
          </tr>
        </template>
      </template>
    </tbody>
  </table>
</div>
<div class="slds-grid slds-grid_align-end slds-m-top_large">
  <lightning-button variant="neutral" label="Nuevo tipo de trabajo" onclick={handleCrear} class="slds-var-m-right_small"></lightning-button>
</div>
</lightning-card>
</template>
<template if:true={creacionTipoDeTrabajo}>
<lightning-card>
    <br />
    <br />
    <br />
    <lightning-record-form object-api-name="tiposDeTrabajo__c" fields={myFields} layout-type="Full" columns="2"
        oncancel={handleCancelTrabajo} onsuccess={handleSuccessTrabajo}>
    </lightning-record-form>
</lightning-card>
</template>
<template if:true={showModal}>
<section role="dialog" class="slds-modal slds-fade-in-open">
    <div class="slds-modal__container" style="width: 800px; max-width: 800px;">
        <!-- Estado de creación de tipo de trabajo -->
        <template if:true={creacionTipoDeTrabajoSub}>
            <header class="slds-modal__header">
                <h2 class="slds-text-heading_medium">Nuevo Tipo de Trabajo</h2>
            </header>
            <div class="slds-modal__content slds-p-around_medium">
                <lightning-record-form 
                    object-api-name="tiposDeTrabajo__c" 
                    fields={myFields} 
                    layout-type="Full" 
                    columns="2"
                    oncancel={handleCancelTrabajoSub} 
                    onsuccess={handleSuccessTrabajoSub}>
                </lightning-record-form>
            </div>
        </template>
        <!-- Estado normal de subtrabajos -->
        <template if:false={creacionTipoDeTrabajoSub}>
            <header class="cust-header slds-modal__header">
                <div class="slds-grid slds-wrap slds-m-top_x-small">
                    <div class="slds-size_1-of-1" style="text-align: left;">
                        <h2 class="slds-text-heading_medium"><b>Punto de trabajo: {trabajoSeleccionado.nombreTrabajo}</b></h2>
                    </div>
                    <div class="slds-size_1-of-1" style="text-align: left;"><b>Horas:</b> {trabajoSeleccionado.uts}</div>
                    <div class="slds-size_1-of-1" style="text-align: left;"><b>Cargo:</b> {trabajoSeleccionado.tipoCargo}</div>
                </div>
                
                <div class="slds-m-top_small">
                    <lightning-button label="Atrás" title="Atrás" onclick={handleCancelarSubTrabajo} class="slds-m-left_x-small"></lightning-button>
                    &nbsp;&nbsp;
                    <lightning-button label="+" variant="brand" onclick={agregarFilaSubtrabajo} disabled={disabledSubtrabajosButton}></lightning-button>
                    &nbsp;&nbsp;
                    <lightning-button label="Guardar" variant="brand" onclick={guardarSubtrabajos}></lightning-button>
                </div>
            </header>
            
            <div class="slds-modal__content slds-p-around_medium" style="height: 300px">
                <table class="slds-table slds-table_bordered slds-table_cell-buffer">
        <thead>
          <tr class="slds-text-title_caps">
            <th>Sub punto de trabajo</th>
            <th>Alias</th>
            <th>Horas</th>
            <th>Borrar</th>
          </tr>
        </thead>
        <tbody>
          <template for:each={subtrabajosTemporal} for:item="subtrabajo">
            <tr key={subtrabajo.id}>
              <td>
                <template if:true={subtrabajo.tipoTrabajo}>
                  <c-lookup 
                    selection={subtrabajo.selectedTipoTrabajo} 
                    onsearch={handleLookupsearch}
                    onselectionchange={handleSubtipoTipoDeTrabajoLookupSelectionChange} 
                    id="TipoDeTrabajo3"
                    placeholder="Tipo de trabajo" 
                    data-id={subtrabajo.id} 
                    required>
                  </c-lookup>
                </template>
                <template if:false={subtrabajo.tipoTrabajo}>
                  <c-lookup 
                    onsearch={handleLookupsearch}
                    onselectionchange={handleSubtipoTipoDeTrabajoLookupSelectionChange} 
                    id="TipoDeTrabajo4"
                    placeholder="Tipo de trabajo" 
                    data-id={subtrabajo.id} 
                    required>
                  </c-lookup>
                </template>
              </td>
                <td>
                <lightning-input style="margin-top: -15px;" type="text" value={subtrabajo.alias}
                  data-id={subtrabajo.id} onchange={handleSubtrabajoAliasChange}>
                </lightning-input>
              </td>
              <td>
                <lightning-input style="margin-top: -15px;" type="decimal" value={subtrabajo.uts}
                  data-id={subtrabajo.id} onchange={handleSubtrabajoUtsChange} disabled={subtrabajo.disabledUts}>
                </lightning-input>
              </td>
              <td>
                <lightning-button-icon icon-name="utility:delete" variant="bare" alternative-text="Eliminar"
                  data-id={subtrabajo.id} onclick={handleDeleteSubtrabajo}>
                </lightning-button-icon>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div> 
            <footer class="slds-modal__footer">
                <div class="slds-grid slds-grid_align-end">
                    <lightning-button variant="neutral" label="Nuevo tipo de trabajo" onclick={handleCrearSub}></lightning-button>
                </div>
            </footer>
        </template>
    </div>
</section>
<div class="slds-backdrop slds-backdrop_open"></div>
</template>
<c-qo-search-detail-product
show-search-modal={showSearchModal}
record-id = {recordId}
oncancel={handleCancelSearch}
onaddlines={handleAddLines}
></c-qo-search-detail-product>
</template>
