<template>
    <div class="grid-container">
        <div style="margin-bottom:20px" class="info-data-container">
            <div class="top-container">
                <lightning-icon class="icon-ctct" icon-name="standard:account" alternative-text="Cuenta" title="Cuenta"></lightning-icon>
                <p class="primary-text">Edición de cuenta jurídica</p>
            </div>

            <div class="bottom-container client-data">
                <div class="create-account-body">
                    <template if:true={isLoading}>
                        <lightning-spinner alternative-text="Cargando..." size="large"></lightning-spinner>
                    </template>

                    <div class="slds-grid slds-gutters slds-wrap">
                        <div class="slds-col slds-size_1-of-2">
                            <label class="slds-form-element__label">*Cédula</label>
                            <lightning-input name="cedula" value={cedula} disabled={puedeEditarCedula}></lightning-input>
                        </div>

                        <div class="slds-col slds-size_1-of-2">
                            <label class="slds-form-element__label">*Razón Social</label>
                            <lightning-input name="nombre" value={nombre} onchange={handleInputChange}></lightning-input>
                        </div>

                        <div class="slds-col slds-size_1-of-2">
                            <label class="slds-form-element__label">*País de Origen</label>
                            <lightning-input name="pais" value={pais} disabled={puedeEditarCedula}></lightning-input>
                        </div>

                        <div class="slds-col slds-size_1-of-2">
                            <lightning-input type="text" 
                            label="*Actividad Comercial" 
                            value={actividadComercialName}
                            onchange={handleActividadSearch}
                            placeholder="Buscar actividad comercial...">
                            </lightning-input>

                            <template if:true={showActividadOptions}>
                                <div class="slds-box slds-m-top_x-small" style="max-height:150px; overflow:auto;">
                                    <template for:each={actividadOptions} for:item="opt">
                                        <div key={opt.Id}
                                            data-id={opt.Id}
                                            data-codigo={opt.Name}
                                            data-nombre={opt.Nombre_actividad_econ_mica__c}
                                            class="slds-p-around_x-small slds-item slds-hint-parent hover-option"
                                            style="cursor:pointer;"
                                            onclick={handleSelectActividad}>
                                            <strong>{opt.Name}</strong> - {opt.Nombre_actividad_econ_mica__c}
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>

                        <lightning-combobox name="giro" label="*Giro del Negocio" value={giro}
                            options={giroNegocioOptions}
                                onchange={handleInputChange}></lightning-combobox>


                    </div>

                    <template if:true={mostrarError}>
                        <div class="slds-text-color_error slds-m-top_small">
                            <lightning-icon icon-name="utility:error" size="x-small"></lightning-icon>
                            <span> Completa todos los campos obligatorios </span>
                        </div>
                    </template>

                    <div class="slds-m-top_medium slds-grid slds-grid_align-end">
                        <lightning-button label="Guardar cambios" variant="brand" onclick={handleGuardar}></lightning-button>
                    </div>
                    <template if:true={recordId}>   
                        <div class="slds-m-top_large">
                            <br/>
                            <c-identificacionesdecuenta account-id={recordId} tipocliente={tipocliente} onactualizar={handleActualizacion}></c-identificacionesdecuenta>
                            <br/>
                            <c-direccionesdecuenta account-id={recordId} tipocliente={tipocliente} onactualizar={handleActualizacion}></c-direccionesdecuenta>
                            <br/>
                            <c-correosdecuenta account-id={recordId} tipocliente={tipocliente} onactualizar={handleActualizacion}></c-correosdecuenta>
                            <br/>
                            <c-contactosrelacionadoscuenta account-id={recordId} tipocliente={tipocliente} onactualizar={handleActualizacion}></c-contactosrelacionadoscuenta>
                            <br/>
                            <c-telefonoscuenta account-id={recordId} tipocliente={tipocliente} onactualizar={handleActualizacion}></c-telefonoscuenta>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>
</template>
