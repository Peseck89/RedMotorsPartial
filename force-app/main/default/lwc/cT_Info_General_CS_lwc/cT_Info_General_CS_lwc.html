<template>
  <div class="grid-container">
    <div class="info-data-container">
      <div class="top-container">
        <lightning-icon class="icon-ctct" icon-name="standard:service_contract" alternative-text="Email"
          title="Email"></lightning-icon>
        <p class="primary-text">
          Datos Generales
        </p>
      </div>
      <div class="bottom-container client-data">
        <span><strong>Asesor: </strong>{asesor}</span>
        <span><strong>Servicio: </strong>{servicio}</span>
        <span><strong>Fecha Ingreso: </strong>{fechaEntrada}</span>
        <span><strong>Cita: </strong><a href={cita}>{cita}</a></span>
        <span><strong>Origen de la cita: </strong>{origenCita}</span>
        <span><strong>Días en proceso: </strong>{diasEnProceso}</span>

        <div class="edit-zone-info">
          <span class="span-container">
            <strong>Requiere lavado: </strong>
            <div if:false={showEditZoneLavado} style="margin-left: 5px;">
              {lavadoFormat}
            </div>
            <div if:true={showEditZoneLavado} class="checkboxs-containers">
              <div class="checkboxs-containers-child">
                Sí:
                <lightning-input style="margin-left: 5px;" type="checkbox" data-value="true" checked={lavado}
                  disabled={lavado} onchange={handleCheckboxChangeLavado}>
                </lightning-input>
              </div>
              <div class="checkboxs-containers-child">
                No:
                <lightning-input style="margin-left: 5px;" type="checkbox" data-value="false" checked={noLavado}
                  disabled={noLavado} onchange={handleCheckboxChangeLavado}>
                </lightning-input>
              </div>
            </div>
          </span>

          <div if:true={showEditZoneLavado} style="display: flex; justify-content:flex-end; width:100%">
            <lightning-button variant="destructive" onclick={handleEditZoneLavado} label="Cancelar" title="Cancelar"
              class="slds-m-left_x-small"></lightning-button>
            <!-- <lightning-button variant="brand" onclick={handleSaveLavado} label="Guardar" title="Guardar"
              class="slds-m-left_x-small"></lightning-button> -->
          </div>

          <lightning-button-icon if:false={showEditZoneLavado} onclick={handleEditZoneLavado} icon-name="utility:edit"
            alternative-text="Editar" title="Edit"></lightning-button-icon>
        </div>

        <div class="edit-zone-info">
          <span class="span-container" style="align-items: center;">
            <strong>Objetos de valor: </strong>
            <div if:false={showEditZoneObjetoValor} style="margin-left: 5px;">
              {objetoValorFormat}
            </div>
            <div if:true={showEditZoneObjetoValor} class="checkboxs-containers">
              <div class="checkboxs-containers-child">
                Sí:
                <lightning-input style="margin-left: 5px;" type="checkbox" data-value="true" checked={objetoValor}
                  disabled={objetoValor} onchange={handleCheckboxChangeObjetoValor}>
                </lightning-input>
              </div>
              <div class="checkboxs-containers-child">
                No:
                <lightning-input style="margin-left: 5px;" type="checkbox" data-value="false" checked={noObjetoValor}
                  disabled={noObjetoValor} onchange={handleCheckboxChangeObjetoValor}>
                </lightning-input>
              </div>
            </div>
            <div if:false={showEditZoneObjetoValor} class="text-area-container">
              <textarea if:true={objetoValor} style="margin-left: 5px;"
                onchange={handleTextareaChangeObjetoValorTXT}>{objetoValorTXT}</textarea>
              <lightning-button if:true={objetoValor} variant="brand" onclick={handleSaveObjetoValorTXT}
                label="Guardar comentario" title="Guardar comentario" class="slds-m-left_x-small"></lightning-button>
            </div>
          </span>

          <div if:true={showEditZoneObjetoValor} style="display: flex; justify-content:flex-end; width:100%">
            <lightning-button variant="destructive" onclick={handleEditZoneObjetoValor} label="Cancelar"
              title="Cancelar" class="slds-m-left_x-small"></lightning-button>
            <!-- <lightning-button variant="brand" onclick={handleSaveObjetoValor} label="Guardar" title="Guardar"
              class="slds-m-left_x-small"></lightning-button> -->
          </div>

          <lightning-button-icon if:false={showEditZoneObjetoValor} onclick={handleEditZoneObjetoValor}
            icon-name="utility:edit" alternative-text="Editar" title="Edit"></lightning-button-icon>
        </div>

        <div class="edit-zone-info">
          <div style="border: none; padding: 0; display:flex; flex-direction:row">
            <span style="border: none; padding: 0; width: max-content;"><strong>Número de guía: </strong></span>
            <span if:false={showEditZoneNumGuia}

            <textarea if:true={showEditZoneNumGuia} style="margin-left: 5px;"

          </div>

          <div if:true={showEditZoneNumGuia} style="display: flex; justify-content:flex-end; width:100%">

            <lightning-button variant="brand" onclick={handleSaveNumGuia} label="Guardar" title="Guardar"

        </div>

        <div class="edit-zone-info">
          <div style="border: none; padding: 0; display:flex; flex-direction:row">

          <lightning-button-icon if:false={showEditZoneColorGuia} onclick={handleEditZoneColorGuia}

        </div>

        <div class="edit-zone-info">

            <strong>¿Dejar repuestos usados en el vehículo?: </strong>
            <div if:false={showEditZoneRepuesto} style="margin-left: 5px;">

            </div>
            <div if:true={showEditZoneRepuesto} class="checkboxs-containers">
              <div class="checkboxs-containers-child">
                Sí:
                <lightning-input style="margin-left: 5px;" type="checkbox" data-value="true" checked={repuesto}

              </div>
              <div class="checkboxs-containers-child">

                </lightning-input>

            </div>
          </span>

          <div if:true={showEditZoneRepuesto} style="display: flex; justify-content:flex-end; width:100%">

            <!-- <lightning-button variant="brand" onclick={handleSaveLavado} label="Guardar" title="Guardar"
              class="slds-m-left_x-small"></lightning-button> -->
          </div>

          <lightning-button-icon if:false={showEditZoneRepuesto} onclick={handleEditZoneRepuesto}
            icon-name="utility:edit" alternative-text="Editar" title="Edit"></lightning-button-icon>
        </div>

        <span style="border: none; padding-bottom:0"><strong>Detalle de estado: </strong>{selectedStatusDetail}</span>
        <div class="slds-p-horizontal_medium" style="display: flex; align-items: flex-end; padding-left: 0">
          <lightning-combobox class="picklist-label" value={selectedStatusDetail}
            placeholder="Seleccionar detalle de estado" options={picklistOptions}
            onchange={handleChange}></lightning-combobox>

          <lightning-button label="Save" onclick={handleSave} class="slds-m-top_medium"
            style="margin: 0 0 2px 15px;"></lightning-button>

        </div>
        <span style="border: none; padding-bottom:0"><strong>Tipo de Combustible: </strong>{tipoCombustibleLabel}</span>
        <div class="slds-p-horizontal_medium" style="display: flex; align-items: flex-end; padding-left: 0">
          <lightning-combobox class="picklist-label" value={tipoCombustible}
            placeholder="Seleccionar tipo de combustible" options={tipoCombustibleOptions}
            onchange={handleCombustibleChange}>
          </lightning-combobox>
        </div>

        <template if:true={showGasolinaField}>
          <span style="border: none; padding-bottom:0"><strong>Nivel de Combustible:
            </strong>{nivelCombustibleLabel}</span>
          <div class="slds-p-horizontal_medium" style="display: flex; align-items: flex-end; padding-left: 0">
            <lightning-combobox class="picklist-label" value={nivelCombustible} placeholder="Seleccionar nivel"
              options={nivelCombustibleOptions} onchange={handleNivelCombustibleChange}>
            </lightning-combobox>
            <lightning-button label="Guardar" onclick={handleSaveCombustible} class="slds-m-top_medium"
              style="margin: 0 0 2px 15px;">
            </lightning-button>
          </div>
        </template>

        <template if:true={showElectricoField}>
          <span style="border: none; padding-bottom:0"><strong>Porcentaje de Carga: </strong>{porcentajeCarga}</span>
          <div class="slds-p-horizontal_medium" style="display: flex; align-items: flex-end; padding-left: 0">
            <lightning-input type="number" min="0" max="100" value={porcentajeCarga}
              onchange={handlePorcentajeCargaChange} placeholder="Ingrese porcentaje (0-100)">
            </lightning-input>
            <lightning-button label="Guardar" onclick={handleSaveCombustible} class="slds-m-top_medium"
              style="margin: 0 0 2px 15px;">
            </lightning-button>
          </div>
        </template>
        <span style="border: none; padding-bottom:0"><strong>Prioridad del caso: </strong>{prioridadCasoLabel}</span>
        <div class="slds-p-horizontal_medium" style="display: flex; align-items: flex-end; padding-left: 0">
          <lightning-combobox class="picklist-label" value={prioridadCaso} placeholder="Seleccionar prioridad del caso"
            options={prioridadCasoOptions} onchange={handlePrioridadChange}>
          </lightning-combobox>
          <lightning-button label="Guardar" onclick={handleSavePriority} class="slds-m-top_medium"
            style="margin: 0 0 2px 15px;">
          </lightning-button>
        </div>

    <div style="margin-bottom:20px" class="info-data-container">
      <div class="top-container">
        <lightning-icon class="icon-ctct" icon-name="standard:user_role" alternative-text="Email"

        <p class="primary-text">
          Detalle Asesor
        </p>
      </div>
      <div class="bottom-container client-data">
        <div if:false={showEditZone} class="edit-zone">
          <span style="border: none;"><strong></strong>{comentarios}</span>
          <lightning-button-icon onclick={handleEditZone} icon-name="utility:edit" alternative-text="Editar"

        </div>
        <div if:true={showEditZone} class="edit-zone">

          <lightning-button variant="brand" onclick={handleSaveComen} label="Guardar" title="Guardar"

        </div>
      </div>
