<template>
    <article class="slds-card">

        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </template>
        
        <template if:false={hideExtraButtons}>
            <div class="slds-card__header slds-grid">
            <header class="slds-media slds-media_center slds-has-flexi-truncate">
                <div class="slds-media__figure">
                </div>
                <div class="slds-media__body">
                    <h2 class="slds-card__header-title">
                        <a href="#" class="slds-card__header-link slds-truncate"
                            title="Crear oportunidad - Seleccionar Inventario">
                            <span>Crear oportunidad - Seleccionar Inventario</span>
                        </a>
                    </h2>
                </div>
            </header>
        </div>
        </template>
        <div class="slds-card__header slds-grid">
        <lightning-button label="Búsqueda detallada" onclick={toggleFilters}></lightning-button>
        </div>
        <template if:true={showFilters}>
        <!--Start filters-->
        <!--<div class="slds-card__body">-->
            <div class="slds-form slds-m-around_small slds-p-around_small" role="list">
                <div class="slds-form__row">
                    <div class="slds-form__item" role="listitem">
                        <div class="slds-form-element slds-form-element_horizontal ">
                            <c-rm_vn_get_record_opp_record_types
                                onrecordtypeselected={handleBrandChange} is-disabled={isDisabledBrandInput}></c-rm_vn_get_record_opp_record_types>
                        </div>
                    </div>
                    <div class="slds-form__item" role="listitem">
                        <div class="slds-form-element slds-form-element_horizontal ">
                            <lightning-combobox name="year" label="Año"
                                 value={selectedYear} onchange={handleYearChange} options={yearOptions} disabled={isDisabledYearInput}>
                            </lightning-combobox>

                        </div>
                    </div>
                </div>
                <div class="slds-form__row">
                    <div class="slds-form__item" role="listitem">
                        <div class="slds-form-element slds-form-element_horizontal">
                            <c-lookup 
                                data-id="family" 
                                selection={familiaInitialSelection} 
                                name="familia" 
                                label="Familia" 
                                errors={familyErrors} 
                                placeholder="Ingrese la familia del vehículo"
                                onsearch={handleFamilySearch} 
                                onselectionchange={handleFamilySelectionChange}
                                >                                  
                            </c-lookup>

                        </div>
                    </div>
                    <div class="slds-form__item" role="listitem">
                        <div class="slds-form-element slds-form-element_horizontal ">
                            <c-lookup data-id="model" selection={modeloInitialSelection} name="modelo" label="Modelo" errors={modelErrors} placeholder="Ingrese el modelo del vehículo"
                                onsearch={handleModelSearch} onselectionchange={handleModelSelectionChange}>                                  
                            </c-lookup>
                        </div>
                    </div>
                </div>    
                <div class="slds-form__row">
                    <div class="slds-form__item" role="listitem">
                        <div class="slds-form-element slds-form-element_horizontal ">
                            <lightning-input type="text" label="Vin" placeholder="Escriba aqui..." name="vin"
                                onchange={handleVinChange} value={vin}> </lightning-input>
                        </div>
                    </div>
                    <div class="slds-form__item" role="listitem">
                        <div class="slds-form-element slds-form-element_horizontal ">
                            <lightning-combobox 
                            label="Color Externo" 
                            placeholder="Seleccione un color" 
                            name="colorExterno" 
                            value={externalColor}
                            options={colorExternoOptions}
                            onchange={handleColorExternoChange}>
                        </lightning-combobox>
                        </div>
                    </div>
                </div>

                <div class="slds-form__row">
                    <div class="slds-form__item" role="listitem">
                        <div class="slds-form-element slds-form-element_horizontal ">
                            <lightning-combobox
                                label="Tapicería"
                                placeholder="Seleccione una tapicería"
                                value={internalColor}
                                options={internalColorOptions}
                                onchange={handleColorInternoChange}>
                            </lightning-combobox>
                        </div>
                    </div>
                    <div class="slds-form__item" role="listitem">
                        <div class="slds-form-element slds-form-element_horizontal ">
                            <lightning-combobox name="TipoCombustible" label="Combustible"
                                placeholder="-- Seleccionar --" value={tipoCombustible}
                                onchange={handleCombustibleChange} options={tipoCombustibleOptions}>
                            </lightning-combobox>
                        </div>
                    </div>
                </div>

                <div class="slds-form__row">
                    
                    <div class="slds-form__item" role="listitem">
                        <div class="slds-form-element slds-form-element_horizontal ">
                            <lightning-combobox name="ubicacion" label="Ubicación"
                            placeholder="-- Seleccionar --" value={locationId}
                            onchange={handleLocationChange} options={locations}>
                            </lightning-combobox>
                        </div>
                    </div>
                    <div class="slds-form__item" role="listitem">
                        <div class="slds-form-element slds-form-element_horizontal ">
                            <lightning-combobox name="Reportado" label="Reportado"
                                placeholder="-- Seleccionar --" value={reportado}
                                onchange={handleReportadoChange} options={reportadoOptions}>
                            </lightning-combobox>
                        </div>
                    </div>
                </div>

                <div class="slds-form__row">
                    
                    <div class="slds-form__item" role="listitem">
                        <div class="slds-form-element slds-form-element_horizontal ">
                            <c-lookup selection={numeroPedidoInitialSelection} name="numeroPedido" label="Pedido" errors={numeroPedidoErrors} placeholder="Ingrese el número de pedido"
                                onsearch={handleNumeroPedidosSearch} onselectionchange={handleNumeroPedidoSelectionChange}>                                  
                            </c-lookup>
                        </div>
                    </div>
                    <div class="slds-form__item" role="listitem" >
                        <div class="slds-form-element slds-form-element_horizontal">
                            <lightning-combobox name="Reportado" label="Reportado" style="display: none"
                                placeholder="-- Seleccionar --" value={reportado}
                                onchange={handleReportadoChange} options={reportadoOptions}>
                            </lightning-combobox>
                        </div>
                    </div>
                </div>
            </div>
            <!--END FILTERS-->
            </template>
            <div style="display: flex;justify-content: space-between;" class="slds-m-bottom_small">
                <div>
                </div>
                <div>
    
                    <template if:false={hideExtraButtons}>
                        <template if:true={puedeModificarBodega}>
                            <lightning-button label="Agregar comentario" title="Agregar comentario" class="slds-m-right_medium" disabled={isCambiarUbicacionDisabled}
                            onclick={handleAgregarComentarioClick}></lightning-button>
    
                            <lightning-button label="Cambiar Ubicación" title="Cambiar bodega de los productos seleccionados" class="slds-m-right_medium" disabled={isCambiarUbicacionDisabled}
                            onclick={handleChangeUbicacionClick}></lightning-button>
                        </template>
                    
                        <lightning-button-menu label="Exportar a CSV" variant="brand" alternative-text="Exportar a CSV" icon-name="utility:settings" class="slds-m-right_medium" onselect={handleExportSelect}>
                            <lightning-menu-item value="comma" label="Exportar usando el separador (,)"  title="Al exportar a csv se usara el , como separador"></lightning-menu-item>
                            <lightning-menu-item value="semicolon" label="Exportar usando el separador (;)" title="Al exportar a csv se usara el ; como separador."></lightning-menu-item>
                        </lightning-button-menu>
                    </template>
                    <slot name="actions">
                    </slot>
                </div>
            </div> 
            <div class="scroller-wrapper">
                <!-- Barra de desplazamiento en la parte superior, fuera de la tabla -->
                <div class="scroller-content">
                    <div class="scrollbar-container" style="overflow-x: auto; width: 100%; position: sticky; top: 0; z-index: 10;">
                        <div style="width: max-content;"></div> <!-- Barra de scroll -->
                    </div>
                </div>
            
                <!-- Contenedor de la tabla con desplazamiento vertical y horizontal -->
                <div style="overflow-x: auto; overflow-y: auto; max-height: 600px; flex-grow: 1;">
                    <lightning-datatable
                        selected-rows={selectedRecordIds} 
                        max-row-selection="1"
                        onrowselection={handleRecordsSelection} 
                        key-field="Id" 
                        data={records} 
                        columns={dynamicColumns}
                        style="min-width: 100%; max-width: 1500px; overflow: auto;">
                    </lightning-datatable>
                </div>
            </div>
              
       

        <footer class="slds-card__footer" style="display: flex;justify-content: space-between;">
            <div>
                <div class="slds-button-group" role="group">
                    <button class="slds-button slds-button_neutral" disabled={isEnablePrevButton}
                        onclick={handleBackClick}>Pag. Anterior</button>
                    <button class="slds-button slds-button_neutral" disabled={isEnableNextButton}
                        onclick={handleNextClick}>Sig. Pagina</button>
                </div>
                <span class="slds-m-left_medium">{totalRecords} registros encontrados, Pagina {pageNumber} de
                    {totalPages}</span>
            </div>
        </footer>
    </article>
</template>
