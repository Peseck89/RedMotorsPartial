    </template>

            <template for:each={groupedItems} for:item="group" for:index="index">
                <div key={group.title} class="accordion__c">
                    <button class="accordion-header" data-index={index} onclick={toggleAccordion}>
                        Trabajo: {group.title}
                    </button>
                    <!-- <div class={accordionContentClass}> -->
                    <div class={group.contentClass}>
                        <div class="content-header">
                            <div>Nombre</div>
                            <div class="text-center">Código artículo</div>
                            <div class="text-center">Cantidad</div>
                            
                            <div class="text-center">Tipo de cargo</div> 
                            <div>Precio</div>
                        </div>
                        <template for:each={group.items} for:item="item">
                            <div key={item.name} class="content-row">
                                <div>{item.name}</div>
                                <div class="text-center">{item.bmwCodigoProducto}</div>
                                <div class="text-center">{item.quantity}</div>
                                <!-- <div class="text-center">{item.uts}</div> -->
                                <div class="text-center">{item.tipoDeCargo}</div>
                                <div>{item.currencyIso} {item.totalPrice}</div>
                            </div>
                        </template>
                        <div class="content-footer">
                            <div>Precio total: {group.currencyIso} {group.groupTotal}</div>
                        </div>
                    </div>
                </div>
            </template>
        </template>
        
        <!-- Mensaje en caso de que no haya items -->
        <template if:false={groupedItems.length}>
            <p>No hay items para mostrar</p>
        </template>
    </div>
</template>
