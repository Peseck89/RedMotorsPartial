<template>
    <article class="slds-card">
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </template>      
        
        <div class="slds-card__header slds-grid">
            <h2 class="slds-card__header-title">
                Registrar anticipo
            </h2>
        </div>

        <div class="slds-card__body">
            <lightning-layout vertical-align="center" class="x-large"  horizontal-align="space">
                <lightning-layout-item flexibility="auto" padding="around-small" size="4">
                        <lightning-input type="search"  label="Por favor ingresa el identificador del pago" value={inputIdentifierNumber} onchange={handleIdentifierChange}> </lightning-input>                                
                </lightning-layout-item>
            </lightning-layout>
        </div>
        <footer class="slds-card__footer" style="display: flex;justify-content: space-between;">
            <div></div> 
            <div>                      
                <lightning-button variant="brand" label="Continuar" title="Continuar" disabled={isDisableButton} onclick={handleClick} class="slds-m-left_x-small"></lightning-button>                                                   
            </div>               
        </footer>       
    </article> 
</template>
