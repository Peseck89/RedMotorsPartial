<template>
    <lightning-card title="Localización de Productos Softland" icon-name="standard:pricebook">
        <template lwc:if={productCode}>
            <div style="display: flex;">
                <div style="min-height: 10px; max-height: 500px; flex: 1;">
                    <div class="slds-table_col-bordered slds-table_bordered" style="height: 100%;">
                        <lightning-datatable
                            key-field="Articulo"
                            data={locations}
                            columns={columns}
                            hide-checkbox-column
                            default-sort-direction="asc"
                            sorted-by="Articulo"
                            sorted-direction="asc">
                        </lightning-datatable>
                    </div>
                </div> 
            </div>
        </template>
    </lightning-card>
</template>
