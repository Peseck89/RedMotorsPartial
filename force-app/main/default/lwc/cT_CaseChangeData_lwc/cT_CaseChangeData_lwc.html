<template>
  <template if:true={showSpinner}>
    <div class="backgroundInverse">
      <lightning-spinner style="background-color: transparent !important;" alternative-text="Loading"
        variant="inverse"></lightning-spinner>
    </div>
  </template>
  <div class="title-container">
    <div class="slds-p-around_medium lgc-bg btn-layout">
      <div class="info-case-vh">
        <h2 class="second-title">
          Placa:
          <a href={assetUrl}>{placa}</a>
        </h2>
        <h2 class="second-title">Estado de la orden: <span style="color: #11508e;">{statusDetail}</span></h2>
      </div>
      <div class="btn-cont-layout">
        <!-- <template if:true={isAdmin}>
              </template> -->
        <div class="tooltip-container">
          <button class="slds-button slds-button_brand" onclick={handleTrabajosPost} title="Actualizar propietario"
          disabled={disabledButtons}>Trabajos Postergados</button>
          <span if:true={alertTrabajos} class="tooltip-text">Tiene trabajos postergados</span>
        </div>

        <button class="slds-button slds-button_brand" onclick={handleEditKm} title="Actualizar propietario"
          disabled={disabledButtons}>Kilometraje</button>

        <div class="tooltip-container">
          <button class="slds-button slds-button_brand" onclick={handleChangeAccuntOwner} title="Actualizar propietario"
          disabled={disabledButtons}>Actualizar propietario</button>
          <span if:true={alertPropietario} class="tooltip-text">Debe actualizar los datos del propietario</span>
        </div>
        <!-- <button class="slds-button slds-button_brand" onclick={handleChangeAccuntOwner} title="Actualizar propietario"
        disabled={disabledButtons}>Actualizar propietario</button> -->

        <button class="slds-button slds-button_brand" onclick={handleEditContact} title="Actualizar contacto"
        disabled={disabledButtons}>Actualizar contacto</button>

        <div class="tooltip-container">
          <button class="slds-button slds-button_brand" onclick={handleEditInvoice} title="Actualizar facturación"
          disabled={disabledButtons}>Actualizar facturación</button>
          <span if:true={alertFacturacion} class="tooltip-text">Debe actualizar los datos de facturación</span>
        </div>
        <!-- <button class="slds-button slds-button_brand" onclick={handleEditInvoice} title="Actualizar facturación"
          disabled={disabledButtons}>Actualizar facturación</button> -->
      </div>
    </div>
  </div>

  <!-- Editar propietario -->
  <template if:true={editAccountOwner}>
    <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-02" aria-modal="true"
      aria-describedby="modal-content-id-2" class="slds-modal slds-fade-in-open">
      <div class="slds-modal__container cust-modal">
        <header style="border-top-left-radius: 10px; border-top-right-radius: 10px;"
          class="slds-modal__header top-container">
          <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Cerrar"
            onclick={handleChangeAccuntOwner} disabled={alertPropietario}>
            <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse"
              size="small"></lightning-icon>
            <span class="slds-assistive-text">Cerrar</span>
          </button>
          <lightning-icon class="icon-ctct" icon-name="standard:decision" alternative-text="Email"
            title="Email"></lightning-icon>
          <h2 id="modal-heading-02" class="slds-text-heading_medium slds-hyphenate" style="margin-left: 5px;">¿Desea
            cambiar el propietario
            asociado al
            vehículo?</h2>
        </header>

        <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-2">
          <template if:true={showSpinner}>
            <div class="backgroundInverse">
              <lightning-spinner style="background-color: transparent !important;" alternative-text="Loading"
                variant="inverse"></lightning-spinner>
            </div>
          </template>
          <div if:false={stepTwo} class="info-data-container">
            <div class="bottom-container client-data">
              <div class="options-check">
                <div class="checkbox-container">
                  <lightning-input onchange={accountChange} type="checkbox-button" label="Cambio de cuenta"
                    name="input1" checked={cambioCuenta}></lightning-input>
                  <p style="font-size: 13px; font-weight: lighter">Cambio de propietario</p>
                </div>
                <div class="checkbox-container">
                  <lightning-input onchange={accountUpdate} type="checkbox-button" label="Cambio de cuenta"
                    name="input1" checked={actuCuenta}></lightning-input>
                  <p style="font-size: 13px; font-weight: lighter">Actualizar propietario</p>
                </div>
              </div>
              <div if:true={actuCuenta} style="width: 100%;">


                <template if:true={accountIdActual}>
                  <template if:true={isPersonAccount}>
                    <c-editar-account-fisica record-id={accountIdActual} onactualizar={handleCuentaActualizada}>
                    </c-editar-account-fisica>
                  </template>
                  <template if:false={isPersonAccount}>
                    <c-editar-account-juridica record-id={accountIdActual} tipocliente="juridica"
                      onactualizar={handleCuentaActualizada}>
                    </c-editar-account-juridica>
                  </template>
                </template>

              </div>
              <div if:true={cambioCuenta} style="width: 100%;">
                <div if:false={noExisteCuenta}>
                  <c-reusable-lookup label="Buscar cuenta personal o empresarial" selected-icon-name="standard:account"
                    object-label="Account" object-api-name="Account" field-api-name="Name"
                    other-field-api-name="Cedula__c" onvalueselected={handleValueSelectedOnAccount}
                    onchange={handleValueSelectedOnAccount}>
                  </c-reusable-lookup>
                </div>
                <div class="checkbox-container" style="margin: 10px 0;">
                  <lightning-input onchange={notAccountExists} type="checkbox-button" label="No existe cuenta"
                    name="input2"></lightning-input>
                  <p style="font-size: 13px; font-weight: lighter">No existe cuenta</p>
                </div>
                <div if:true={noExisteCuenta}>

                  <c-create-account-l-w-c case-id={recordId} esfactura={esCambioFacturacion}
                    oncuentacreada={handleCuentaCreada}></c-create-account-l-w-c>

                </div>
              </div>
            </div>
          </div>
          <div if:true={stepTwo} class="info-data-container">
            <div style="align-items: stretch;" class="bottom-container client-data">
              <lightning-input type="text" value={nombreCuenta} label="Nombre" onchange={cambiarNombreCuenta}
                required></lightning-input>
              <lightning-input type="text" value={apellido} label="Apellido" onchange={cambiarApellidoCuenta}
                required></lightning-input>
              <lightning-input type="text" value={correoElectronico} onchange={cambiarCorreoCuenta} label="Correo"
                required></lightning-input>
              <lightning-input type="tel" value={telefono} onchange={cambiarTelefonoCuenta} label="Teléfono"
                required></lightning-input>
            </div>
          </div>

        </div>

        <footer style="border-bottom-left-radius: 10px; border-bottom-right-radius: 10px;" class="slds-modal__footer">
          <!-- Boton cancelar y atras -->
          <button if:false={stepTwo} class="slds-button slds-button_neutral" onclick={handleChangeAccuntOwner}
            title="Cancel" disabled={alertPropietario}>Cancelar</button>
          <button if:true={stepTwo} class="slds-button slds-button_neutral" onclick={handleBackStepTwo}
            title="Atrás">Atrás</button>

          <button if:true={nextButton} class="slds-button slds-button_brand" onclick={actualizarCuenta}
            title="Actualizar Información">Siguiente</button>

          <button if:true={stepTwo} class="slds-button slds-button_brand" onclick={actualizarCuenta} title="OK">Crear
            Cuenta</button>
        </footer>
      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
  </template>

  <!-- Editar contacto -->
  <template if:true={editContact}>
    <template if:true={showSpinner}>
      <div class="backgroundInverse">
        <lightning-spinner style="background-color: transparent !important;" alternative-text="Loading"
          variant="inverse"></lightning-spinner>
      </div>
    </template>
    <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-03" aria-modal="true"
      aria-describedby="modal-content-id-3" class="slds-modal slds-fade-in-open">
      <div class="slds-modal__container">
        <header style="border-top-left-radius: 10px; border-top-right-radius: 10px;"
          class="slds-modal__header top-container">
          <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Cerrar"
            onclick={handleEditContact}>
            <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse"
              size="small"></lightning-icon>
            <span class="slds-assistive-text">Cerrar</span>
          </button>
          <lightning-icon class="icon-ctct" icon-name="standard:product_transfer_state" alternative-text="Email"
            title="Email"></lightning-icon>
          <h2 id="modal-heading-03" class="slds-text-heading_medium slds-hyphenate" style="margin-left: 5px;">¿Desea
            cambiar el contacto asociado
            al
            vehículo?</h2>
        </header>

        <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-3">
          <div class="info-data-container">
            <div class="bottom-container client-data">
              <div class="options-check">
                <div class="checkbox-container">
                  <lightning-input onchange={accountChange} type="checkbox-button" label="Cambio de cuenta"
                    name="input1" checked={cambioCuenta}></lightning-input>
                  <p style="font-size: 13px; font-weight: lighter">Cambio de contacto</p>
                </div>
                <div class="checkbox-container">
                  <lightning-input onchange={accountUpdate} type="checkbox-button" label="Cambio de cuenta"
                    name="input1" checked={actuCuenta}></lightning-input>
                  <p style="font-size: 13px; font-weight: lighter">Actualizar contacto</p>
                </div>

              </div>
              <div if:true={actuCuenta} style="width: 100%;">
                <lightning-input type="text" disabled value={contactName} label="Nombre" onchange={setNombreContacto}
                  required></lightning-input>
                <lightning-input type="text" disabled value={apellidoContacto} label="Apellido"
                  onchange={setApellidoContacto} required></lightning-input>
                <lightning-input type="text" disabled value={identificacionContacto} label="Cédula"
                  onchange={setCedulaContacto} required></lightning-input>
                <lightning-input type="text" value={contactEmail} label="Correo" onchange={setCorreoContacto}
                  required></lightning-input>
                <lightning-input type="text" value={contactPhone} label="Teléfono" onchange={setTelefonoContacto}
                  required></lightning-input>

              </div>
              <div if:true={actuMismo} style="width: 100%;">
                <div class="slds-p-horizontal_medium">
                  <!-- Input Field -->
                  <lightning-input label="Propietario" type="text" disabled="true" value={nombreCuenta}
                    placeholder="Enter Account Name">
                  </lightning-input>
                </div>
              </div>
              <!-- <div if:false={cambioCuenta} class="checkbox-container">
                    <lightning-input onchange={accountMismo} type="checkbox-button" label="Cambio de cuenta"
                      name="inputMismo" checked={actuMismo}></lightning-input>
                    <p style="font-size: 13px; font-weight: lighter">Igual que el propietario.</p>
                  </div>  -->
              <div if:true={cambioCuenta} style="width: 100%;">
                <c-reusable-lookup label="Buscar contacto" selected-icon-name="standard:contact" object-label="Contact"
                  object-api-name="Contact" field-api-name="Name" other-field-api-name="email"
                  onvalueselected={handleValueSelectedOnContacto} onchange={handleValueSelectedOnContacto}>
                </c-reusable-lookup>
                <div class="checkbox-container" style="margin: 10px 0;">
                  <lightning-input onchange={notAccountExists} type="checkbox-button" label="No existe contacto"
                    name="input2"></lightning-input>
                  <p style="font-size: 13px; font-weight: lighter">No existe contacto</p>
                </div>
                <div if:true={noExisteCuenta}>
                  <lightning-input type="text" label="Nombre" onchange={setNombreContacto} required></lightning-input>
                  <lightning-input type="text" label="Apellido" onchange={setApellidoContacto}
                    required></lightning-input>
                  <lightning-input type="tel" label="Teléfono" required
                    onchange={setTelefonoContacto}></lightning-input>
                  <lightning-input type="email" label="Correo electrónico" onchange={setCorreoContacto}
                    required></lightning-input>
                  <div class="checkbox-container" style="margin: 10px 0;">
                    <lightning-input type="checkbox-button" label="Principal" name="input3"></lightning-input>
                    <p style="font-size: 13px; font-weight: lighter">Principal</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <footer style="border-bottom-left-radius: 10px; border-bottom-right-radius: 10px;" class="slds-modal__footer">
          <button class="slds-button slds-button_neutral" onclick={handleEditContact} title="Cancel">Cancelar</button>
          <button if:true={cambioCuenta} class="slds-button slds-button_brand" onclick={actualizarContacto}
            title="OK">Confirmar</button>
          <button if:true={actuMismo} class="slds-button slds-button_brand" onclick={actualizarContactoMismo}
            title="OK">Confirmar</button>
          <button if:true={actuCuenta} class="slds-button slds-button_brand" onclick={actualizarContacto}
            title="OK">Confirmar</button>
        </footer>
      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
  </template>

  <template if:true={editKm}>
    <template if:true={showSpinner}>
      <div class="backgroundInverse">
        <lightning-spinner style="background-color: transparent !important;" alternative-text="Loading"
          variant="inverse"></lightning-spinner>
      </div>
    </template>
    <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-04" aria-modal="true"
      aria-describedby="modal-content-id-4" class="slds-modal slds-fade-in-open">
      <div class="slds-modal__container" style="min-width: 60% !important;">
        <header style="border-top-left-radius: 10px; border-top-right-radius: 10px;"
          class="slds-modal__header top-container">
          <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Cerrar"
            onclick={handleEditKm}>
            <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse"
              size="small"></lightning-icon>
            <span class="slds-assistive-text">Cerrar</span>
          </button>
          <lightning-icon class="icon-ctct" icon-name="standard:indicator_performance_period"
            alternative-text="Kilometraje" title="Kilometraje"></lightning-icon>
          <h2 id="modal-heading-04" class="slds-text-heading_medium slds-hyphenate" style="margin-left: 5px;">
            Kilometraje</h2>
        </header>

        <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-4">
          <div class="info-data-container">
            <div class="bottom-container client-data">
              <div class="edit-container">
                <span><strong>Actualizar Kilometraje: </strong></span>
                <lightning-input style="margin-top: -15px; margin-left: 5px; width: 50%; font-size: 15px" type="text"
                  onchange={setKilometraje}></lightning-input>
                <div class="edit-zone-info" style="padding-bottom: 0;">
                  <lightning-button variant="brand" label="Guardar" onclick={handleKilometrajeChange} title="Guardar"
                    class="slds-m-left_x-small"></lightning-button>
                </div>
              </div>

              <div class="table-container" style="width: 100%; padding-top: 36px">
                <table style="width: 100%;">
                  <thead>
                    <tr>
                      <th>Kilometraje Anterior</th>
                      <th>Nuevo Kilometraje</th>
                      <th>Usuario</th>
                      <th>Fecha</th>
                      <th>Acciones</th>
                    </tr>
                  </thead>

                  <tbody>
                    <template for:each={historiales} for:item="historial">
                      <tr key={historial.Id}>
                        <td>
                          <lightning-formatted-number value={historial.UltimoKilometraje__c}
                            maximum-fraction-digits="2"></lightning-formatted-number>
                        </td>
                        <td>
                          <template if:true={historial.isEditing}>
                            <lightning-input type="number" onchange={setKilometrajeTemp} value={historial.tempNuevoKm}
                              data-id={historial.Id} step="0.1" min={historial.UltimoKilometraje__c}>
                            </lightning-input>
                          </template>
                          <template if:false={historial.isEditing}>
                            <lightning-formatted-number value={historial.NuevoKilometraje__c}
                              maximum-fraction-digits="2"></lightning-formatted-number>

                          </template>
                        </td>
                        <td>{historial.UsuarioQueRealizaElCambio__r.Name}</td>
                        <td>
                          <lightning-formatted-date-time value={historial.CreatedDate} year="numeric" month="2-digit"
                            day="2-digit">
                          </lightning-formatted-date-time>
                        </td>
                        <td>
                          <template if:true={historial.isFirst}>
                            <template if:true={historial.isEditing}>
                              <lightning-button-icon icon-name="utility:save" onclick={handleSave}
                                data-id={historial.Id}>
                              </lightning-button-icon>
                              <lightning-button-icon icon-name="utility:close" onclick={handleCancel}
                                data-id={historial.Id}>
                              </lightning-button-icon>
                            </template>
                            <template if:false={historial.isEditing}>
                              <lightning-button-icon icon-name="utility:edit" onclick={handleEdit}
                                data-id={historial.Id}>
                              </lightning-button-icon>
                            </template>
                          </template>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>

            </div>
          </div>
        </div>
        <footer style="border-bottom-left-radius: 10px; border-bottom-right-radius: 10px;" class="slds-modal__footer">
          <button class="slds-button slds-button_neutral" onclick={handleEditKm} title="Cancel">Cerrar</button>
        </footer>
      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
  </template>

  <!-- Trabajos Postergados-->
   <template if:true={showSpinnerTrabajos}>
      <div class="spinner-overlay">
          <lightning-spinner alternative-text="Cargando" size="large"></lightning-spinner>
      </div>
    </template>

   <template if:true={trabajosPostergados}>
    <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-04" aria-modal="true"
      aria-describedby="modal-content-id-4" class="slds-modal slds-fade-in-open">
      <div class="slds-modal__container" style="min-width: 60% !important;">
        <header style="border-top-left-radius: 10px; border-top-right-radius: 10px;"
          class="slds-modal__header top-container">
          <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Cerrar"
            onclick={handleTrabajosPost}>
            <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse"
              size="small"></lightning-icon>
            <span class="slds-assistive-text">Cerrar</span>
          </button>
          <lightning-icon class="icon-ctct" icon-name="standard:indicator_performance_period"
            alternative-text="Kilometraje" title="Kilometraje"></lightning-icon>
          <h2 id="modal-heading-06" class="slds-text-heading_medium slds-hyphenate" style="margin-left: 5px;">
            Trabajos Postergados</h2>
        </header>

        <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-6">
          <div class="info-data-container">
            <div class="bottom-container client-data">
              

              <div class="table-container" style="width: 100%; padding-top: 36px">
                <table style="width: 100%;">
                  <thead>
                    <tr>
                      <th>Nombre</th>
                      <th colspan="3">Acciones</th>
                    </tr>
                  </thead>

                  <tbody>
                    <template for:each={lsTrabajos} for:item="trabajo">
                      <tr key={trabajo.Id}>
                        <td>{trabajo.Alias__c}</td>
                        <td>{trabajo.Name}</td>
                        <td><button class="slds-button slds-button_neutral" onclick={mantenerTrabajosDelay} data-id={trabajo.Id} title="Mantener">Mantener</button></td>
                        <td><button class="slds-button slds-button_destructive" onclick={deleteTrabajo} data-id={trabajo.Id} title="Rechazar">Rechazar</button></td>
                        <td><button class="slds-button slds-button_success" onclick={aceptarTrabajo} data-id={trabajo.Id} title="Aceptar">Aceptar</button></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>

            </div>
          </div>
        </div>
        <footer style="border-bottom-left-radius: 10px; border-bottom-right-radius: 10px;" class="slds-modal__footer">
          <button class="slds-button slds-button_neutral" onclick={handleTrabajosPost} title="Cancel">Cerrar</button>
        </footer>
      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
  </template>

  <!-- Cambio factu  -->
  <template if:true={editInvoiceData}>
    <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-05" aria-modal="true"
      aria-describedby="modal-content-id-5" class="slds-modal slds-fade-in-open">
      <div class="slds-modal__container cust-modal">
        <header style="border-top-left-radius: 10px; border-top-right-radius: 10px;"
          class="slds-modal__header top-container">
          <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Cerrar"
            onclick={handleEditInvoice} disabled={alertFacturacion}>
            <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse"
              size="small"></lightning-icon>
            <span class="slds-assistive-text">Cerrar</span>
          </button>
          <lightning-icon class="icon-ctct" icon-name="standard:product_transfer_state" alternative-text="Email"
            title="Email"></lightning-icon>
          <h2 id="modal-heading-05" class="slds-text-heading_medium slds-hyphenate" style="margin-left: 5px;">Cambiar
            información de facturación</h2>
        </header>

        <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-5">
          <div class="info-data-container">
            <div class="bottom-container client-data">
              <div class="options-check">
                <div class="checkbox-container">
                  <lightning-input onchange={accountChange} type="checkbox-button" label="Cambio de cuenta"
                    name="input1" checked={cambioCuenta}></lightning-input>
                  <p style="font-size: 13px; font-weight: lighter">Cambio de cuenta de facturación</p>
                </div>
                <div class="checkbox-container">
                  <lightning-input onchange={accountUpdate} type="checkbox-button" label="Cambio de cuenta"
                    name="input1" checked={actuCuenta}></lightning-input>
                  <p style="font-size: 13px; font-weight: lighter">Actualizar información de facturación</p>
                </div>

              </div>
              <div if:true={actuCuenta} style="width: 100%;">

                <template if:true={accountIdActual}>
                  <template if:true={personalFacturacion}>
                    <c-editar-account-fisica record-id={facturacionActual} onactualizar={handleCuentaActualizada}>
                    </c-editar-account-fisica>
                  </template>
                  <template if:false={personalFacturacion}>
                    <c-editar-account-juridica record-id={facturacionActual} tipocliente="juridica"
                      onactualizar={handleCuentaActualizada}>
                    </c-editar-account-juridica>
                  </template>
                </template>

              </div>
              <div if:true={cambioCuenta} style="width: 100%;">
                <div if:false={noExisteCuenta}>
                  <c-reusable-lookup label="Buscar cuenta personal o empresarial" selected-icon-name="standard:account"
                    object-label="Account" object-api-name="Account" field-api-name="Name"
                    other-field-api-name="Cedula__c" onvalueselected={handleValueSelectedOnAccountInvoice}
                    onchange={handleValueSelectedOnAccountInvoice}>
                  </c-reusable-lookup>
                </div>
                <div class="checkbox-container" style="margin: 10px 0;">
                  <lightning-input onchange={notAccountExists} type="checkbox-button" label="No existe cuenta"
                    name="input2"></lightning-input>
                  <p style="font-size: 13px; font-weight: lighter">No existe cuenta</p>
                </div>
                <div if:true={noExisteCuenta}>
                  <c-create-account-l-w-c case-id={recordId} esfactura={esCambioFacturacion}
                    oncuentacreada={handleCuentaCreada}></c-create-account-l-w-c>
                </div>
              </div>
            </div>
          </div>
        </div>
        <footer style="border-bottom-left-radius: 10px; border-bottom-right-radius: 10px;" class="slds-modal__footer">


          <!-- Boton cancelar y atras -->
          <button if:false={stepTwo} class="slds-button slds-button_neutral" onclick={handleEditInvoice}
            title="Cancel" disabled={alertFacturacion}>Cancelar</button>
          <button if:true={stepTwo} class="slds-button slds-button_neutral" onclick={handleBackStepTwo}
            title="Atrás">Atrás</button>

          <button if:true={nextButton} class="slds-button slds-button_brand" onclick={cambiarFacturacion}
            title="Actualizar Información">Siguiente</button>

          <button if:true={stepTwo} class="slds-button slds-button_brand" onclick={actualizarCuenta} title="OK">Crear
            Cuenta</button>

        </footer>
      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
  </template>
</template>
