<template>
    <lightning-card  >
        <div class="c-container">
            <lightning-layout>
                <lightning-layout-item padding="around-small">

                    <lightning-record-form
                    object-api-name={objectApiName}
                    fields={fields}
                    onsuccess={handleSuccess}
                    >
                    </lightning-record-form>

                    <template if:true={areDetailsVisible}>
                        <lightning-button variant="brand-outline" label="Volver" title="Volver" onclick={handleClick} class="slds-m-left_x-small"></lightning-button>
                    </template>
                </lightning-layout-item>
            </lightning-layout>
        </div>
    </lightning-card>
</template>
