<template>
    <article class="slds-card">
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </template>        
        <div class="slds-card__header slds-grid">
            <header class="slds-media slds-media_center slds-has-flexi-truncate">
                <div class="slds-media__figure">
                    <span class="slds-icon_container slds-icon-standard-contact" title="Favor de seleccionar el modelo de interes a validar en inventario">
                        <lightning-icon icon-name="standard:products" alternative-text="Favor de seleccionar el modelo de interes a validar en inventario" title="Favor de seleccionar el modelo de interes a validar en inventario"></lightning-icon>
                        <span class="slds-assistive-text">Favor de seleccionar el modelo de interes a validar en inventario</span>
                    </span>
                </div>
                <div class="slds-media__body">
                    <h2 class="slds-card__header-title">
                        <a href="#" class="slds-card__header-link slds-truncate" title="Favor de seleccionar el modelo de interes a validar en inventario">
                            <span>Favor de seleccionar el modelo de interes a validar en inventario</span>
                        </a>
                    </h2>
                </div>
            </header>
        </div>
        <div class="slds-card__body">
            <lightning-datatable
                max-row-selection="1"
                onrowselection={handleOppLineItemSelection}
                selected-rows={selectedOppProdInteresIds}   
                key-field="Id"
                data={records}
                columns={columns}>
            </lightning-datatable>
        </div>
        <footer class="slds-card__footer" style="display: flex;justify-content: space-between;">
            <div></div> 
            <div>                
                <lightning-button variant="brand" label="Siguiente" title="Siguiente" disabled={isDisableAcceptButton}
                    onclick={handleNextClick} class="slds-m-left_x-small"></lightning-button>                                                   
            </div>               
        </footer>       
    </article>    
</template>
