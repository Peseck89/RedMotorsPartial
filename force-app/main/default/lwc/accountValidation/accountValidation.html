<template>
  <section data-status={accountValidation.AccountError} role="dialog" tabindex="-1" aria-modal="true" aria-label="Meaningful description of the modal content" class="slds-modal slds-fade-in-open slds-align_absolute-center">
    <div class="slds-modal__container" style="width: 20%;">
      <div class="slds-modal__content slds-p-around_medium slds-align_absolute-center" id="modal-content-id-1" style="border-top-right-radius: 0.25rem; border-top-left-radius: 0.25rem;">
        <lightning-record-edit-form object-api-name={objectApiName} record-id={recordId} onsuccess={handleSubmit} data-id="Save">
          <lightning-messages></lightning-messages> 
          <div class="slds-text-align_center">
            <h1 id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate">Información Necesaria Para Continuar</h1>
            <lightning-output-field field-name="Name"></lightning-output-field>
          </div>
          <div class="slds-grid ">
            <div class="slds-col slds-text-align_center">
              <h4 if:true={softlandRequested} style="font-weight: bold;color: #0070d2;">Salesforce</h4>
              
              <lightning-input-field data-type="softlandField" data-name="Softland_Tipo_Documento__c" field-name="Tipo_de_Documento__c" onchange={handleInputChangeTipo} required></lightning-input-field>
              <lightning-input-field data-type="softlandField" data-name="Softland_Numero_Identificacion__c" field-name="Cedula__c" onchange={handleInputChange} required></lightning-input-field>
              <div class="slds-text-color_error">{errorText}</div>
              <lightning-input-field data-type="softlandField" data-name="Softland_Email__c"  if:true={isPhysical} field-name="PersonEmail" required></lightning-input-field>
              <lightning-input-field data-type="softlandField" data-name="Softland_Email__c"  if:false={isPhysical} field-name="CorreoElectronicoEmpresarial__c" required></lightning-input-field>
              <lightning-input-field data-type="softlandField" data-name="Softland_Phone__c"    field-name="Phone" required></lightning-input-field>
              <lightning-input-field data-type="softlandField" data-name="Softland_FE_Email__c" field-name="Invoice_Email__c" required></lightning-input-field>
              <lightning-input-field data-type="softlandField" data-name="Softland_Phone2__c"    field-name="Invoice_Phone__c" required></lightning-input-field>
            </div>
            <div if:true={accountWrapper} class="slds-col slds-text-align_center">
              <h4 style="font-weight: bold;color: #d25f00;">Softland</h4>
              <lightning-input-field   field-name="Tipo_de_Documento__c"  value={softlandTipoId} disabled readonly></lightning-input-field>
              <lightning-input-field   field-name="Numero_Cedula_Representante_Legal__c"  value={softlandNumeroId} required readonly></lightning-input-field>
                
              <lightning-input-field   field-name="Softland_Email__c"  value={accountWrapper.email} required readonly></lightning-input-field>
              <lightning-input-field  field-name="Softland_Phone__c" value={accountWrapper.telefono1} required readonly></lightning-input-field>
              <lightning-input-field  field-name="Softland_FE_Email__c" value={accountWrapper.email_doc_electronico} required readonly></lightning-input-field>
              <lightning-input-field  field-name="Softland_Phone__c" value={accountWrapper.telefono2} required readonly></lightning-input-field>
            </div>
          </div>
          <div class="slds-text-align_center">
            <lightning-button data-id="Cancel" variant="destructive" class="slds-var-p-around_x-small" label="Cancel" onclick={handleSubmit}></lightning-button>
            <lightning-button data-id="Save" class="slds-m-top_small" variant="brand" type="submit" name="update" label="Guardar"></lightning-button>
          </div>
        </lightning-record-edit-form>
      </div>
    </div>
  </section>
  <template if:true={accountValidation.AccountError}> 
    <!-- Modal/Popup Box LWC starts here -->
    <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-02" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open slds-modal_small">
        <div class="slds-modal__container"   style="width: 80%;" >
            <!-- Modal/Popup Box LWC header here -->
            <header class="slds-modal__header custom-error-header">
              <template if:true={correoComodinPersonal} >
                <h1 id="modal-heading-03" class="slds-text-heading_medium slds-hyphenate" style="padding-left: 20px;padding-right: 20px;"><b>Error correo comodín asociado al caso</b></h1>
              </template>
              <template if:true={correoComodinEmpresarial} >
                <h1 id="modal-heading-04" class="slds-text-heading_medium slds-hyphenate" style="padding-left: 20px;padding-right: 20px;"><b>Error correo comodín asociado al caso</b></h1>
              </template>
              <template if:true={isNoContacto} >
                <h1 id="modal-heading-05" class="slds-text-heading_medium slds-hyphenate" style="padding-left: 20px;padding-right: 20px;"><b>Error en el CONTACTO asociado al caso</b></h1>
              </template>
              <template if:true={noInfoContacto} >
                <h1 id="modal-heading-02" class="slds-text-heading_medium slds-hyphenate" style="padding-left: 20px;padding-right: 20px;"><b>Error en el CONTACTO asociado al caso</b></h1>
              </template>
              <template if:true={otroModelo} >
                <h1 id="modal-heading-07" class="slds-text-heading_medium slds-hyphenate" style="padding-left: 20px;padding-right: 20px;"><b>Error en el vehículo asociado al caso</b></h1>
              </template>
            </header>
            <!-- Modal/Popup Box LWC body starts here -->
            <template if:false={correoComodinPersonal} >
            <template if:false={otroModelo} >
            <div class="slds-modal__content slds-p-around_medium" style="text-align: center;"> 
                 <b style="font-size: 18px;">Cuenta Empresarial:</b></p>
                <p><b style="font-size: 18px;">{accountValidation.AccountMessageError}
                </b></p>
            </div>
            </template>
            </template>
            <template if:true={correoComodinPersonal} >
              <template if:false={otroModelo} >
              <div class="slds-modal__content slds-p-around_medium" style="text-align: center;"> 
                   <b style="font-size: 18px;">Cuenta Personal:</b></p>
                  <p><b style="font-size: 18px;">{accountValidation.AccountMessageError}
                  </b></p>
              </div>
              </template>
              </template>
            <template if:true={otroModelo} >
              <div class="slds-modal__content slds-p-around_medium" style="text-align: center;"> 
                   <b style="font-size: 18px;"></b></p>
                  <p><b style="font-size: 18px;">{accountValidation.AccountMessageError}
                  </b></p>
                  <lightning-record-edit-form
                  object-api-name="Asset" 
                  record-id={assetId}
                  onsubmit={handleAssetSuccess}>
                  <lightning-input-field field-name="Tipo_de_veh_culo__c"> </lightning-input-field>
                  <lightning-input-field field-name="Marca_Nvo__c"> </lightning-input-field>
                  <lightning-input-field field-name="Modelo_Nvo__c"> </lightning-input-field> 
                  <div class="slds-text-color_error">{errorMessageModelo}</div>
                  <div class="slds-var-m-top_medium">
                  <lightning-button variant="brand" type="submit" label="Guardar">
                  </lightning-button>
               </div>
            </lightning-record-edit-form>
              </div>
              </template>
            <template if:true={isNoContacto} >
            <div class="slds-modal__content slds-p-around_medium" style="text-align: center;">
              <p><b style="font-size: 18px;"> Introduzca por favor el contacto 
              </b></p>
              <lightning-record-edit-form
              object-api-name="Case" 
              record-id={caseId}
              onsubmit={handleCaseSuccess}>
              <lightning-input-field field-name="ContactId"> </lightning-input-field>
              <div class="slds-var-m-top_medium">
              <lightning-button variant="brand" type="submit" label="Guardar">
              </lightning-button>
               </div>
            </lightning-record-edit-form>
            </div>
          </template>
          <template if:true={noInfoContacto} >
            <div class="slds-modal__content slds-p-around_medium" style="text-align: center;">
              </b></p>
              <lightning-record-edit-form
              object-api-name="Contact"
              record-id={contactId}
              onsubmit={handleContactSuccess}> 
              <lightning-input-field field-name="Email" required="true"> </lightning-input-field>
              <lightning-input-field required="true" field-name="Phone" onchange={handlePhoneChange}> </lightning-input-field>
              <lightning-input-field required="true" field-name="FirstName" onchange={handleNameChange}> </lightning-input-field>
              <lightning-input-field arequired="true" field-name="LastName" onchange={handleLastNameChange}> </lightning-input-field>
              <div class="slds-text-color_error">{errorMessageName}</div>
              <div class="slds-text-color_error">{errorMessageLastName}</div>
              <div class="slds-text-color_error">{errorMessagePhone}</div>
              <div class="slds-var-m-top_medium">
              <lightning-button variant="brand" type="submit" label="Guardar">
              </lightning-button>
               </div>
            </lightning-record-edit-form>
            </div>
          </template>
          <template if:true={correoComodinPersonal} >
            <div class="slds-modal__content slds-p-around_medium" style="text-align: center;">
              <p><b style="font-size: 18px;">
              </b></p>
              <lightning-record-edit-form
              object-api-name="Account"
              record-id={recordId}
              onsubmit={handleSuccessAccountPersonal}>
              <lightning-input-field field-name="PersonEmail" onchange={handleCorreoPersonalChange}> </lightning-input-field>
              <div class="slds-text-color_error">{errorMessageCorreoPersonal}</div>
              <div class="slds-var-m-top_medium">
              <lightning-button variant="brand" type="submit" label="Guardar">
              </lightning-button>
               </div>
            </lightning-record-edit-form>
            </div>
          </template>
          <template if:true={correoComodinEmpresarial} >
            <div class="slds-modal__content slds-p-around_medium" style="text-align: center;">
              <p><b style="font-size: 18px;">
              </b></p>
              <lightning-record-edit-form
              object-api-name="Account"
              record-id={recordId}
              onsubmit={handleSuccessAccountEmpresarial}> 
              <lightning-input-field field-name="CorreoElectronicoEmpresarial__c" onchange={handleCorreoEmpresarialChange}> </lightning-input-field>
              <div class="slds-text-color_error">{errorMessageCorreoEmpresarial}</div>
              <div class="slds-var-m-top_medium">
              <lightning-button variant="brand" type="submit" label="Guardar">
              </lightning-button>
               </div>
            </lightning-record-edit-form>
            </div>
          </template>
            <!-- Modal/Popup Box LWC footer starts here -->
            <footer class="slds-modal__footer" style="text-align: center;">
                <!--<button class="slds-button  slds-button_brand" onclick={navigateToaccount} title="Cancel">OK</button>-->
            </footer>
        </div>
    </section>
  </template>
  <div class="slds-backdrop slds-backdrop_open" role="presentation" style="height: 500px;top: 21.7%;opacity: 0.8;"></div>
</template>
