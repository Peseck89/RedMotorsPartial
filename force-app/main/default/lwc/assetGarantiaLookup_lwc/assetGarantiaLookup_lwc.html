<template>

    <template if:true={isLoading}>
        <lightning-spinner size="small"></lightning-spinner>
    </template>

    <lightning-card title="Consultar Garantía Vehículo" icon-name="standard:vehicle">
        <div class="slds-p-around_medium">
            <!-- Lookup personalizado -->
            
            <c-reusable-lookup 
                label="Buscar vehículo por placa"
                selected-icon-name="standard:asset" 
                object-label="Asset" 
                object-api-name="Asset" 
                field-api-name="numeroDePlaca__c"  
                placeholder="Ingrese placa..."
                other-field-api-name="Name"         
                onvalueselected={handleSeleccion}
                required
            ></c-reusable-lookup>

            <!-- Botón Consultar (solo habilitado con vehículo seleccionado) -->
            <div class="slds-m-top_medium">
                <lightning-button 
                    label="Consultar Garantía" 
                    variant="brand"
                    onclick={validarGarantia}
                ></lightning-button>
            </div>
        </div>
        
        <!-- Modal de Resultado -->
        <template if:true={mostrarModal}>
            <section class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h2 class="slds-text-heading_medium">Resultado de Garantía</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p><strong>{resultado.mensaje}</strong></p>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button 
                            label="Agendar Cita" 
                            variant="brand"
                            onclick={agendarCita}
                            if:true={resultado.aplicaGarantia}
                        ></lightning-button>
                        <lightning-button 
                            label="Cerrar" 
                            variant="neutral"
                            onclick={cerrarModal}
                        ></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </lightning-card>
</template>
