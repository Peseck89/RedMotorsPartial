<template>
  <!-- PANTALLA 1 -->
  <template if:true={firstScreen}>
    <lightning-card title="Selecciona la Lista de Precios">
      <div class="slds-p-around_medium slds-grid slds-wrap slds-gutters">
        <div class="slds-col slds-size_1-of-1 slds-m-top_medium">
          <lightning-combobox
            name="pricebook"
            label="Lista de Precios"
            placeholder="Elige una lista de precios"
            value={selectedPricebookId}
            options={pricebookOptions}
            onchange={handlePricebookChange}>
          </lightning-combobox>
        </div>
        <div class="slds-col slds-size_1-of-1 slds-m-top_medium">
          <lightning-button
            variant="brand"
            label="Continuar"
            onclick={handleContinue}
            disabled={disableContinue}>
          </lightning-button>
        </div>
      </div>
    </lightning-card>
  </template>

  <!-- PANTALLA 2 -->
  <template if:false={firstScreen}>
    <lightning-card title="Búsqueda detallada de Productos">
      <div class="slds-p-around_medium">
        <template lwc:if={showDetailedSearch}>
          <h3 class="slds-text-heading_small slds-m-bottom_small">
            <lightning-icon icon-name="standard:product" size="small"></lightning-icon>
            Búsqueda de Productos
          </h3>

          <!-- Encabezado con selección y botón Atrás -->
          <div class="slds-p-around_medium">
            <div class="slds-grid slds-wrap slds-m-bottom_small slds-align_absolute-center">
              <div class="slds-col slds-size_1-of-1 slds-medium-size_2-of-3 slds-text-title">
                Lista de precios: <strong>{selectedPricebookName}</strong>
                &nbsp;&bull;&nbsp;
              </div>
              <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-text-align_right">
                <lightning-button
                  variant="neutral"
                  label="Atrás"
                  title="Volver a selección"
                  onclick={handleBackToFirst}>
                </lightning-button>
              </div>
            </div>
          </div>

          <!-- Filtros / búsqueda -->
          <lightning-layout multiple-rows>
            <lightning-layout-item size="5" class="slds-p-bottom_medium" style="height: 80px;">
              <div class="slds-p-around_medium">
                <lightning-input
                  type="search"
                  class="slds-m-bottom_small"
                  onchange={handleSearchProduct}
                  value={productName}>
                </lightning-input>
              </div>
            </lightning-layout-item>
          </lightning-layout>

          <!-- Tabla -->
          <div style="display:flex; min-height:10px; max-height:500px;">
            <div style="flex:1;">
              <div class="slds-table_col-bordered slds-table_bordered" style="height:100%;">
                <template if:true={refreshTable}>
                  <lightning-datatable
                    data={productList}
                    onrowselection={selectProducts}
                    columns={cols}
                    key-field="ID"
                    selected-rows={selectedRows}>
                  </lightning-datatable>
                </template>
              </div>
            </div>
          </div>
        </template>

        <template lwc:else>
          <template lwc:if={showButtonPrice}>
            <div lwc:if={productCodeSelected}>
              <c-pricebook-reference-details
                product-code={productCodeSelected}
                empresa-factura={empresaFactura}>
              </c-pricebook-reference-details>
            </div>
          </template>

          <template lwc:if={showButtonLocation}>
            <div lwc:if={productCodeSelected}>
              <c-localizacion-details
                product-code={productCodeSelected}
                empresa-factura={empresaFactura}>
              </c-localizacion-details>
            </div>
          </template>
        </template>
      </div>

      <div slot="footer" class="slds-align_absolute-center">
        <template lwc:if={showButtonPrice}>
          <button
            class="slds-button slds-button_brand"
            onclick={handleShowPricebookTableToggle}
            disabled={disablePriceRederence}>
            {toogleLabelPricebook}
          </button>
        </template>
        <template lwc:if={showButtonLocation}>
          <button
            class="slds-button slds-button_brand slds-m-left_small"
            onclick={handleShowLocalizacionTableToggle}
            disabled={disableLocalizaciones}>
            {toogleLabelLocation}
          </button>
        </template>
      </div>
    </lightning-card>
  </template>
</template>
