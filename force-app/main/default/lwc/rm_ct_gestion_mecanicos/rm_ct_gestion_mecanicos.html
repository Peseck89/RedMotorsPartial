<template>
    <lightning-card>
        <lightning-layout>
            <lightning-layout-item  padding="around-medium">
                <lightning-button-menu label="Acciones" alternative-text="Acciones" variant="border"  onselect={handleExportSelect}>
                    <lightning-menu-item value="crearTiempoImproductivo" label="Registrar Actividad"></lightning-menu-item>
                </lightning-button-menu>
            </lightning-layout-item>
            <lightning-layout-item padding="around-medium">
                <lightning-combobox
                    name="territoryId"
                    label="Taller"
                    value={territotyId}
                    placeholder="Seleccione una opción"
                    options={territoryOptions}
                    variant="label-hidden"
                    onchange={handleTerritoryChange}></lightning-combobox>
            </lightning-layout-item>
            <lightning-layout-item>
                <!-- <lightning-input type="date" name="fecha" variant="label-hidden" onchange={handleFechaChange}></lightning-input> -->
            </lightning-layout-item>
        </lightning-layout>
        <lightning-layout>
            <lightning-layout-item>
            </lightning-layout-item>
            <lightning-layout-item flexibility="auto" size="12" padding="horizontal-medium">
                <template if:true={isLoading}>
                    <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                </template>

                <lightning-datatable hide-checkbox-column selected-rows={selectedIds}
                    onrowselection={handleSelectionEvent} key-field="id" data={contacts} columns={columns}>
                </lightning-datatable>
            </lightning-layout-item>
        </lightning-layout>
    </lightning-card>
</template>
