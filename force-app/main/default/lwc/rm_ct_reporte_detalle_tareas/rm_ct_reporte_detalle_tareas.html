<template>
    <lightning-modal-header label="Detalle de tareas"></lightning-modal-header>
    <lightning-modal-body>
        <div class="slds-m-left_medium slds-m-right_small slds-m-bottom_small">
            <template if:true={isLoading}>
                <div class="slds-m-around_medium">
                    <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                </div>
            </template>            
            <template if:false={isLoading}>
                <template if:true={workSteps}>
                    <lightning-datatable
                        key-field="Id"
                        data={workSteps}
                        columns={columns}
                        hide-checkbox-column="true">
                    </lightning-datatable>
                </template>
                <template if:true={error}>
                    <p>{error}</p>
                </template>
            </template>
        </div>
    </lightning-modal-body>
    <lightning-modal-footer>
    </lightning-modal-footer>
</template>
