<template>
    <template if:true={firstScreen}>
        <lightning-card title="Creación de Trabajos a realizar del Caso">
                <div class="slds-form slds-form_stacked slds-var-m-around_xx-large">
                    <c-lookup selection={initialSelection} errors={errors} onsearch={handleLookupsearch}
                        onselectionchange={handleLookupSelectionChange} label="Trabajos a realizar" id="TipoDeTrabajo"
                        placeholder="Trabajos a realizar">
                    </c-lookup>
                    <lightning-layout>
                        <lightning-layout-item>
                            <lightning-combobox data-id="TipoCargo" id="TipoCargo" name="TipoCargo"
                                label="Tipo de Cargo" placeholder="--Seleccionar--" value="{}" options={options} required
                                onchange={handleTipoCargoSelection}
                                message-when-value-missing={tipoCargoRequeridoMessage}
                                >
                            </lightning-combobox>
                        </lightning-layout-item>
                        <lightning-layout-item>
                            <template if:true={showAseguradora}>
                                <c-lookup errors={errors} onsearch={handleLookupsearch} id="Aseguradora"
                                    onselectionchange={handleLookupSelectionChange} label="Aseguradora"
                                    placeholder="Aseguradora">
                                </c-lookup>
                            </template>
                            <template if:true={showCentroCosto}>
                                <c-lookup errors={errors} onsearch={handleLookupsearch} id="CentroCosto"
                                    onselectionchange={handleLookupSelectionChange} label="Centro de Costo"
                                    placeholder="Centro de Costo">
                                </c-lookup>
                            </template>
                        </lightning-layout-item>
                    </lightning-layout>
                    <div class="row">
                        <lightning-textarea data-id=Comments name="comments" label="Comentarios"
                            onchange={handleNumberChange}></lightning-textarea>
                    </div>
                    <div class="slds-var-m-top_large slds-text-align_right">
                        <lightning-button variant="brand" label="Nuevo tipo de trabajo" onclick={handleCrear}></lightning-button>
                    </div>
                    <div class="slds-var-m-top_large slds-text-align_right">
                        <lightning-button variant="brand" label="Siguiente" onclick={handleSubmit}></lightning-button>
                    </div>
                </div>
        </lightning-card>
    </template>
    <template if:true={secondScreen}>
        <lightning-card>
            <lightning-layout>
                <c-search-mano-de-obra recid={recId} centrodecosto={centroDeCosto} aseguradora={aseguradora}
                    tipodecargo={tipoDeCargo} tipodetrabajoid={tipoDeTrabajoId} tipodetrabajocaso={tipoDeTrabajoCaso} nombretrabajo={tipoCargoSeleccionado}>
                </c-search-mano-de-obra>
            </lightning-layout>
        </lightning-card>
    </template>
    <template if:true={thirdScreen}>
        <lightning-card>
        </br>
        </br>
        </br>
            <lightning-record-form
                object-api-name="tiposDeTrabajo__c"
                fields={myFields}
                layout-type="Full"
                columns="2" 
                oncancel={handleCancelTrabajo}
                onsuccess={handleSuccessTrabajo}>                
            </lightning-record-form>
        </lightning-card>
    </template>
    <!-- Added account validation for Email and Phone-->
    <c-account-validation
            if:true={accountValidationFlag}
            record-id={accountId}
            is-physical={isPhysical}
            onupdateaccount={handleUpdateAccount}
            >
    </c-account-validation>
</template>
