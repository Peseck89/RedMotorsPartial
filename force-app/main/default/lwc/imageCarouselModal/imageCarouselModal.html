<template>
    <!-- <template if:true={isOpen}> -->
    <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
        <!-- <div  class="slds-modal__container"> -->
        <div  class="slds-modal__container" style="padding: 5px;">
            <header style="background-color: #FFF;">
                <!-- <button class="slds-button slds-button_icon slds-modal__close slds-button_icon" title="Close" onclick={handleClose}> -->
                <button title="Close" onclick={handleClose} style="background: transparent;border:none;padding-top:6px">
                    <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                    <span class="slds-assistive-text">Close</span>
                </button>
                <!-- <h2 class="slds-text-heading_medium">Image Carousel</h2> -->
            </header>
            <div class="slds-modal__content slds-p-around_medium">
                <!-- <div class="carousel-wrapper"> -->
                <div class="slds-size_2-of-3" style="margin-inline: auto;">
                    <lightning-carousel class="carousel-cust">
                        <template for:each={files} for:item="file">
                            <lightning-carousel-image
                                key={file.id}
                                src={file.preview}
                                header={file.title}
                                description={file.fileType}
                                alternative-text="File Preview">
                            </lightning-carousel-image>
                        </template>
                    </lightning-carousel>
                </div>
            </div>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
    <!-- </template> -->
</template>
