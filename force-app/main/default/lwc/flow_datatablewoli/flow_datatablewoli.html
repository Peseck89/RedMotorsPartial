<template>
    <template if:true={lineItems}>

        <!-- Display total general above all tables, aligned to the right -->
        <div style="text-align: center; margin-bottom: 20px;">
            <strong><h2>Total General: {totalGeneral}</h2></strong>
        </div>

        <template for:each={lineItems} for:item="trabajoGroup">
            <div key={trabajoGroup.trabajo}>
                <!-- Display the 'Trabajo a realizar' heading -->
                <h3>{trabajoGroup.trabajo}</h3>
                
                <!-- Display items within each 'Trabajo a realizar' group -->
                <lightning-datatable
                    key-field="codigoArticulo"
                    data={trabajoGroup.items}
                    columns={columns}
                    max-row-selection="0">
                </lightning-datatable>
                
                <!-- Display total trabajo and currency below the table, centered -->
                <div style="text-align: center; margin-top: 10px;">
                    <strong>Total Trabajo: {trabajoGroup.totalTrabajo}</strong>
                </div>
                <br/>
            </div>
        </template>
    </template>
    
    <template if:true={error}>
        <p>{error}</p>
    </template>
</template>
