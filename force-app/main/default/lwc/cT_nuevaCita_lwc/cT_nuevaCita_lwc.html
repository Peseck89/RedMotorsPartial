<template>
  <template if:false={infoData}>
    <!-- <template if:true={infoData}> -->
    <div class="title-container">
      <div class="slds-p-around_medium lgc-bg">
        <h2 class="second-title">
          Nueva Cita:
        </h2>
      </div>
    </div>
    <div class="slds-p-around_medium lgc-bg main-container">
      <div class="inputs-container">

        <div class="data-container">
          <div class="top-container">
            <lightning-icon class="icon-ctct" icon-name="standard:service_appointment" alternative-text="Email"
              title="Email"></lightning-icon>
            <p class="primary-text">
              Fecha Seleccionada: <lightning-formatted-date-time value={fechaSeleccionada} year="numeric"
                month="numeric" day="numeric" hour="2-digit" minute="2-digit" time-zone={timeZoneOffset}
                hour12={ampm}></lightning-formatted-date-time>
            </p>
          </div>
        </div>

        <div class="data-container">
          <div class="top-container">
            <lightning-icon class="icon-ctct" icon-name="standard:visits" alternative-text="Email"
              title="Email"></lightning-icon>
            <p class="primary-text">
              Origen
            </p>
          </div>
          <template if:true={esContact}>
            <div class="bottom-container">
              <lightning-select class="select-a" name="origen" label="Origen" value={value} options={optionsContact}
                onchange={handleChange} required></lightning-select>
            </div>
          </template>
          <template if:false={esContact}>
            <div class="bottom-container">
              <lightning-select class="select-a" name="origen" label="Origen" value={value} options={options}
                onchange={handleChange} required></lightning-select>
            </div>
          </template>

        </div>

        <div class="data-container">
          <div class="top-container">
            <lightning-icon class="icon-ctct" icon-name="standard:travel_mode" alternative-text="Email"
              title="Email"></lightning-icon>
            <p class="primary-text">
              Buscar vehículo existente por:
              <span if:true={vehiculoPlaca}> Placa</span>
              <span if:true={vehiculoVin}> VIN</span>
            </p>
          </div>
          <div class="bottom-container" style="height: auto;">
            <div class="checkbox-container" style="justify-content: space-between;">
              <div class="checkbox-container" style="margin-bottom: 10px;">
                <lightning-input onchange={handleSearchPlaca} type="checkbox-button"
                  placeholder="Buscar vehículo por placa" name="inputPlaca" checked={vehiculoPlaca}
                  disabled={vehiculoPlaca}>
                </lightning-input>
                <p style="font-size: 13px; font-weight: lighter">Buscar vehículo por placa</p>
              </div>
              <div class="checkbox-container" style="margin-bottom: 10px;">
                <lightning-input onchange={handleSearchVin} type="checkbox-button" placeholder="Buscar vehículo por VIN"
                  name="inputVin" checked={vehiculoVin} disabled={vehiculoVin}>
                </lightning-input>
                <p style="font-size: 13px; font-weight: lighter">Buscar vehículo por VIN</p>
              </div>
            </div>

            <c-reusable-lookup if:true={vehiculoPlaca} label="Buscar vehículo existente por placa"
              selected-icon-name="standard:asset" object-label="Asset" object-api-name="Asset" field-api-name="Name"
              placeholder={placeholder} other-field-api-name="numeroDePlaca__c"
              onvalueselected={handleValueSelectedOnPlaca} onchange={handleValueSelectedOnPlaca} required>
            </c-reusable-lookup>

            <c-reusable-lookup if:true={vehiculoVin} label="Buscar vehículo existente por VIN"
              selected-icon-name="standard:asset" object-label="Asset" object-api-name="Asset"
              field-api-name="NumeroDeChasis__c" other-field-api-name="numeroDePlaca__c" placeholder={placeholder}
              onvalueselected={handleValueSelectedOnVIN} onchange={handleValueSelectedOnVIN}>
            </c-reusable-lookup>

          </div>
        </div>

      </div>
    </div>
    <footer style="border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; background: #f7f7f7;"
      class="slds-modal__footer">
      <lightning-button variant="neutral" label="Crear nuevo vehículo" onclick={openModal} title="Crear nuevo vehículo"
        icon-name="utility:add" icon-position="right" class="slds-m-right_x-small"></lightning-button>
      <lightning-button variant="brand" label="Siguiente" title="Siguiente" onclick={validaSeleccion}
        icon-name="utility:forward" icon-position="right" class="slds-m-left_x-small">
      </lightning-button>
    </footer>
  </template>

  <template if:true={infoData}>
    <!-- <template if:false={infoData}> -->
    <div class="title-container">
      <div class="slds-p-around_medium lgc-bg btn-layout">
        <h2 class="second-title">
          Datos de la cita
        </h2>
        <div class="btn-cont-layout">
          <button class="slds-button slds-button_brand" onclick={handleChangeAccuntOwner}
            title="Actualizar propietario">Actualizar propietario</button>
          <button class="slds-button slds-button_brand" onclick={handleEditContact}
            title="Actualizar contacto">Actualizar contacto</button>
        </div>
      </div>
    </div>

    <div class="colums-container">
      <div style="width: 33.33%;" class="slds-p-around_medium lgc-bg main-container">

        <div class="info-data-container">
          <div class="top-container">
            <lightning-icon class="icon-ctct" icon-name="standard:people" alternative-text="Email"
              title="Email"></lightning-icon>
            <p class="primary-text">
              Propietario
            </p>
          </div>
          <div class="bottom-container client-data">
            <span><strong>Nombre: </strong>{nombreCuenta}</span>
            <span><strong>Cédula: </strong>{identificacion}</span>
            <span><strong>Teléfono: </strong>{telefono}</span>
            <span if:false={personalAccount}><strong>Correo: </strong>{correoElectronico}</span>
            <span if:true={personalAccount}><strong>Correo: </strong>{personalEmail}</span>
            <span><strong>Código Softland: </strong>{cedula}</span>
          </div>
        </div>

        <!-- <div if:false={personalAccount} class="info-data-container"> -->
        <div class="info-data-container">
          <div class="top-container">
            <lightning-icon class="icon-ctct" icon-name="standard:employee_contact" alternative-text="Email"
              title="Email"></lightning-icon>
            <p class="primary-text">
              Contacto
            </p>
          </div>
          <div if:true={personalAccount} class="bottom-container client-data">
            <!-- <span><strong>Nombre: </strong>{nombreCuenta}</span>
            <span><strong>Cédula: </strong>{identificacion}</span>
            <span><strong>Teléfono: </strong>{telefono}</span>
            
            <span><strong>Correo personal: </strong>{personalEmail}</span> -->
            <span><strong>Nombre: </strong>{contactName} {apellidoContacto} </span>
            <!-- <span><strong>Cédula: </strong>{identificacionContacto}</span> -->
            <span><strong>Teléfono: </strong>{contactPhone}</span>
            <span><strong>Correo: </strong>{contactEmail}</span>
          </div>
          <div if:false={personalAccount} class="bottom-container client-data">
            <span><strong>Nombre: </strong>{contactName} {apellidoContacto} </span>
            <!-- <span><strong>Cédula: </strong>{identificacionContacto}</span> -->
            <span><strong>Teléfono: </strong>{contactPhone}</span>
            <span><strong>Correo: </strong>{contactEmail}</span>
          </div>
        </div>

        <div class="info-data-container">
          <div class="top-container">
            <lightning-icon class="icon-ctct" icon-name="standard:travel_mode" alternative-text="Email"
              title="Email"></lightning-icon>
            <p class="primary-text">
              Vehículo
            </p>
          </div>
          <div class="bottom-container client-data">
            <span><strong>Tipo: </strong>{tipoVehiculo}</span>
            <span><strong>Número de placa: </strong>{placa}</span>
            <span><strong>VIN: </strong>{numeroChasis}</span>
            <span><strong>Año: </strong>{anioVehiculo}</span>
            <span><strong>Color: </strong>{color}</span>
            <span><strong>Marca: </strong>{marcaVehiculo}</span>
            <span><strong>Modelo: </strong>{modeloVehiculo}</span>
            <span><strong>Marca otros: </strong>{marcaOtros}</span>
            <span><strong>Modelo otros: </strong>{modeloOtros}</span>
          </div>
        </div>

      </div>
      <!-- Segunda columna -->
      <div style="width: 33.33%;" class="slds-p-around_medium lgc-bg main-container">
        <div class="info-data-container">
          <div class="top-container">
            <lightning-icon class="icon-ctct" icon-name="standard:app_form_participant" alternative-text="Email"
              title="Email"></lightning-icon>
            <p class="primary-text">
              Seleccionar calendario y asesor
            </p>
          </div>
          <div style="width: 100%; align-items:stretch;" class="bottom-container client-data">
            <template if:true={tieneCalendario}>
              <lightning-combobox name="calendario" required="true" label="Calendario" value={calendarioSel}
                placeholder={calendarioSel} options={optionsCalendario} onchange={handleChangeCalendario}>
              </lightning-combobox>
            </template>
            <template if:false={tieneCalendario}>
              <lightning-combobox name="calendario" required="true" label="Calendario" value={calendarioSel}
                placeholder="Seleccione el calendario" options={optionsCalendario} onchange={handleChangeCalendario}>
              </lightning-combobox>
            </template>
            <template if:true={tieneAsesor}>
              <lightning-combobox name="asesor" label="Asesor" required="true" value={valueAsesor}
                placeholder={nombreAsesor} options={optionsAsesor} onchange={handleChangeAsesor}>
              </lightning-combobox>
            </template>
            <template if:false={tieneAsesor}>
              <lightning-combobox name="asesor" label="Asesor" required="true" value={valueAsesor}
                placeholder="Seleccione el asesor" options={optionsAsesor} onchange={handleChangeAsesor}>
              </lightning-combobox>
            </template>

          </div>
        </div>
        <div class="info-data-container" style="min-width: 100%;">
          <div class="top-container">
            <lightning-icon class="icon-ctct" icon-name="standard:schedule_objective" alternative-text="Email"
              title="Email"></lightning-icon>
            <p class="primary-text">
              Fecha de reserva para cita
            </p>
          </div>
          <div style="align-items: stretch;" class="bottom-container client-data">
            <p style="font-size: 13px; font-weight: 500">Fecha y hora seleccionada:</p>
            <p style="font-size: 13px; font-weight: lighter"><lightning-formatted-date-time value={fechaSeleccionada}
                year="numeric" month="numeric" day="numeric" hour="2-digit" minute="2-digit" time-zone={timeZoneOffset}
                hour12={ampm}></lightning-formatted-date-time>
            </p>
            <lightning-textarea style="margin: 10px 0 20px 0; width: 100%" name="comentarios" label="Comentarios"
              onchange={cambiarDescripcion} value={descripcion}></lightning-textarea>

            <div class="checkbox-container">
              <lightning-input onchange={handleChangeDateAndHou} type="checkbox-button" label="Editar Fecha/Hora"
                name="input1"></lightning-input>
              <p style="font-size: 13px; font-weight: lighter">Editar fecha/hora</p>
            </div>
            <div if:true={mostrarHorarios} class="checkbox-container">
              <p>Sugerencias de horarios:</p>
              <p>{optionsHorarios}</p>
            </div>
            <div class="checkbox-container" if:true={editDateAndHour}>

              <lightning-input style="margin-bottom: 10px;" onchange={validarHorarios} type="datetime"
                name="cambioFecha" label="Seleccionar Fecha"></lightning-input>
            </div>
            <!-- <lightning-input style="margin-bottom: 10px;" if:true={mostrarFechaCambio} type="date" name="cambioHora" label="Seleccionar Hora" ></lightning-input> -->
            <!-- <div class="checkbox-container" if:true={mostrarFechaCambio}>
              <lightning-select name="origen" label="Horarios disponibles" value={value} options={optionsHorarios} onchange={handleChangeHora} required></lightning-select>
            </div> -->
            <div style="margin-top: 20px;" class="checkbox-container" if:true={mostrarFechaCambio}>
              <button class="slds-button slds-button_brand" onclick={cambiarHorarios} title="OK">Confirmar</button>
            </div>
          </div>
        </div>

        <template if:true={mostrarHorariosSugeridos}>
          <div class="info-data-container">
            <div class="top-container">
              <lightning-icon class="icon-ctct" icon-name="standard:schedule_objective" alternative-text="Email"
                title="Email"></lightning-icon>
              <p class="primary-text">
                Horarios sugeridos para Garantías
              </p>
            </div>
            <div style="width: 100%; align-items:stretch;" class="bottom-container client-data">
              <!-- Contenido principal -->
              <div class="schedule-grid">
                <template for:each={horariosSugeridos} for:item="dia">
                  <div key={dia.fecha} class="date-card">
                    <div class="date-header">
                      <h3>Fecha: {dia.fecha}</h3>
                    </div>
                    <div class="hours-grid">
                      <template for:each={dia.horarios} for:item="hora">
                        <div key={hora} class="hour-slot">
                          <!-- Cambio: Botón para seleccionar hora -->
                          <button onclick={handleHoraSeleccionada}
                            data-fecha={dia.fecha} data-hora={hora}>
                            {hora}
                          </button>
                        </div>
                      </template>  
                    </div>
                  </div>
                </template>
              </div>

            </div>
          </div>
        </template>

        <div class="info-data-container">
          <div class="top-container">
            <lightning-icon class="icon-ctct" icon-name="standard:service_request_detail" alternative-text="Email"
              title="Email"></lightning-icon>
            <p class="primary-text">
              Tipo de seguro
            </p>
          </div>
          <div style="width: 100%; align-items:stretch;" class="bottom-container client-data">
            <p>{seguroVehiculo}</p>
          </div>
        </div>

      </div>
      <!-- Tercera columna -->
      <div style="width: 33.33%;" class="slds-p-around_medium lgc-bg main-container">
        <div class="info-data-container" style="min-width: 100%;">
          <div class="top-container">
            <lightning-icon class="icon-ctct" icon-name="standard:work_contract" alternative-text="Email"
              title="Email"></lightning-icon>
            <p class="primary-text">
              Planes de mantenimiento
            </p>
          </div>
          <div class="bottom-container client-data">
            <p if:false={hasWarrantyPlan}>NO HAY UN PLAN DE MANTENIMIENTO ASOCIADO A ESTE VEHÍCULO</p>
            <div class="bottom-container client-data" if:true={hasWarrantyPlan} style="padding: 0 !important;">
              <span><strong>Plan de mantenimiento: </strong>{AssetWarrantyNumber}</span>
              <span><strong>Término de plan de mantenimiento: </strong>{AssetWarrantyTerm}</span>
              <span><strong>Fecha de inicio: </strong>{AssetWarrantyStartDate}</span>
              <span><strong>Fecha final: </strong>{AssetWarrantyEfectiveEndDate}</span>
              <span><strong>Efecto a partir de: </strong>{AssetWarrantyEfectiveStartDate}</span>
              <span><strong>Tipo de plan de mantenimiento: </strong>{AssetWarantyType}</span>
            </div>
          </div>
        </div>

        <div class="info-data-container" style="width: max-content !important; min-width: 95%; max-width: 100%">
          <div class="top-container">
            <lightning-icon class="icon-ctct" icon-name="standard:service_appointment_capacity_usage"
              alternative-text="Email" title="Email"></lightning-icon>
            <p class="primary-text">
              Otras citas reservadas para este vehículo
            </p>
          </div>
          <div style="height: 300px;" class="bottom-container table-data">
            <lightning-datatable key-field="id" data={data} columns={columns}>
            </lightning-datatable>
          </div>
        </div>

        <div class="info-data-container" style="min-width: 100%;">
          <div class="top-container">
            <lightning-icon class="icon-ctct" icon-name="standard:file" alternative-text="Email"
              title="Email"></lightning-icon>
            <p class="primary-text">
              Archivos
            </p>
          </div>
          <div style="align-items: center;" class="bottom-container client-data">
            <lightning-file-upload name="fileUploader" accept={acceptedFormats} record-id={myRecordId}
              onuploadfinished={handleUploadFinished} multiple>
            </lightning-file-upload>
          </div>
        </div>
      </div>
    </div>

    <footer style="border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; background: #f7f7f7;"
      class="slds-modal__footer">
      <button class="slds-button slds-button_neutral" onclick={appointmentBack} title="Cancel">Anterior</button>
      <button class="slds-button slds-button_brand" onclick={crearEvento} title="OK">Agendar</button>
    </footer>

  </template>

  <template if:true={showSpinner}>
    <div class="backgroundInverse">
      <lightning-spinner style="background-color: transparent !important;" alternative-text="Loading"
        variant="inverse"></lightning-spinner>
    </div>
  </template>

  <!--Use template if:true to display/hide popup based on isModalOpen value-->
  <template if:true={isModalOpen}>
    <!-- Modal/Popup Box LWC starts here -->
    <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true"
      aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
      <div class="slds-modal__container">
        <!-- Modal/Popup Box LWC header here -->
        <header style="border-top-left-radius: 10px; border-top-right-radius: 10px;"
          class="slds-modal__header top-container">
          <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close"
            onclick={closeModal}>
            <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse"
              size="small"></lightning-icon>
            <span class="slds-assistive-text">Close</span>
          </button>
          <lightning-icon class="icon-ctct" icon-name="standard:travel_mode" alternative-text="Email"
            title="Email"></lightning-icon>
          <h2 id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate">Crear nuevo vehículo</h2>
        </header>

        <!-- Modal/Popup Box LWC body starts here -->
        <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
          <!-- <div if:true={firstStep}>
                  <lightning-select name="origen" label="Origen" value={value} options={options} onchange={handleChange} required></lightning-select>
                </div> -->
          <div class="information-container" if:true={firstStep}>
            <div class="left-clmn">
              <lightning-input value={placa} type="text" label="Placa" onchange={setPlaca}></lightning-input>
              <lightning-select name="tipoVehiculo" label="Tipo de vehículo" value={modalValue} options={modalOptions}
                onchange={handleChangeTipo} required></lightning-select>
              <lightning-select name="marcaNvo" label="Marca" value={modalValue} options={modalOptionsMarca}
                onchange={handleChangeMarca} required></lightning-select>
              <lightning-select name="modeloNvo" label="Modelo" value={modalValue} options={modalOptionsModelo}
                onchange={handleChangeModelo} required></lightning-select>
              <lightning-input value={numeroChasis} type="text" label="Número de chasis" onchange={setNumeroChasis}
                required></lightning-input>
              <lightning-input value={motor} type="text" label="Motor" onchange={setMotor} required></lightning-input>
              <lightning-input value={color} type="text" label="Color" onchange={setColor}></lightning-input>
              <lightning-input value={anioVehiculo} type="text" label="Año del vehículo" onchange={setAnio}
                required></lightning-input>
              <lightning-input if:true={mostrarHoras} value={kilometros} type="number" label="Horas de uso"
                onchange={setKilimetros} required></lightning-input>
              <lightning-input if:false={mostrarHoras} value={kilometros} type="number" label="Kilometros"
                onchange={setKilimetros} required></lightning-input>
              <!-- <lightning-input if:true={accountExists} type="search" label="Buscar cuenta" placeholder="Cuenta" required></lightning-input> -->
              <c-reusable-lookup if:true={accountExists} label="Buscar cuenta" selected-icon-name="standard:account"
                object-label="Account" object-api-name="Account" field-api-name="Name"
                other-field-api-name="CorreoElectronicoEmpresarial__c" onvalueselected={handleValueSelectedOnAccount}>
              </c-reusable-lookup>
              <div class="checkbox-container" style="margin-top: 10px;">
                <lightning-input onchange={handleAccountExistsChange} type="checkbox-button" label="Cuenta no Existe"
                  placeholder="Cuenta no Existe" name="input4"></lightning-input>
                <p style="font-size: 13px; font-weight: lighter">Cuenta no existe</p>
              </div>
              <!-- <lightning-input type="checkbox" label="Cuenta no Existe" placeholder="Cuenta no Existe" onchange={handleAccountExistsChange}></lightning-input> -->
            </div>
            <div class="right-clmn" if:false={accountExists}>
              <lightning-input value={nombreCuenta} if:true={empAccount} onchange={cambiarNombreCuenta} type="text"
                label="Nombre de la Cuenta" required></lightning-input>
              <lightning-input value={nombreCuenta} if:false={empAccount} onchange={cambiarNombreCuenta} type="text"
                label="Nombre" required></lightning-input>
              <lightning-input value={apellido} type="text" onchange={cambiarApellidoCuenta} label="Apellido"
                required></lightning-input>
              <lightning-input value={cedulaBuscada} type="text" label="Cédula" onchange={setCedulaBuscar}
                required></lightning-input>
              <lightning-input value={telefono} type="text" onchange={cambiarTelefonoCuenta}
                label="Teléfono"></lightning-input>
              <lightning-input value={correoElectronico} type="email" onchange={cambiarCorreoCuenta}
                label="Correo Electrónico"></lightning-input>
              <lightning-input value={nombreEncargado} onchange={setNombreEncargado} if:true={empAccount} type="text"
                label="Nombre encargado de la cuenta" required></lightning-input>
              <lightning-input value={telefonoEncargado} onchange={setTelefonoEncargado} if:true={empAccount}
                type="text" label="Teléfono encargado de la cuenta" required></lightning-input>
              <div class="checkbox-container" style="margin-top: 10px;">
                <lightning-input onchange={handleEmpAccount} type="checkbox-button" label="Cuenta Empresarial"
                  placeholder="Cuenta Empresarial" name="input5"></lightning-input>
                <p style="font-size: 13px; font-weight: lighter">Cuenta empresarial</p>
              </div>
              <!-- <lightning-input type="checkbox" label="Cuenta Empresarial" placeholder="Cuenta Empresarial" onchange={handleEmpAccount}></lightning-input> -->
            </div>

          </div>
          <div if:true={secondStep} class="information-container">
            <div style="align-items: stretch;" class="bottom-container client-data">
              <lightning-input value={nombreCuenta} type="text" label="Nombre" required></lightning-input>
              <lightning-input value={apellido} type="text" label="Apellido" required></lightning-input>
              <lightning-input value={correoElectronico} type="email" onchange={cambiarCorreoCuenta} label="Correo"
                required></lightning-input>
              <lightning-input value={telefono} type="tel" onchange={cambiarTelefonoCuenta} label="Teléfono"
                required></lightning-input>
              <!-- <lightning-input value={nombreCuenta} type="text" label="Profesión"></lightning-input> -->
            </div>
          </div>
        </div>

        <!-- Modal/Popup Box LWC footer starts here -->
        <footer if:true={accountExists} style="border-bottom-left-radius: 10px; border-bottom-right-radius: 10px;"
          class="slds-modal__footer">
          <button if:true={firstStep} class="slds-button slds-button_neutral" onclick={closeModal}
            title="Cancel">Cancelar</button>
          <button if:true={secondStep} class="slds-button slds-button_neutral" onclick={previousStep}
            title="Anterior">Anterior</button>
          <!-- <button if:false={secondStep}  class="slds-button slds-button_brand" onclick={submitDetails} title="Siguiente cuenta existe">Siguiente</button> -->
          <button if:false={secondStep} class="slds-button slds-button_brand" onclick={crearVehiculo}
            title="Crear vehículo">Crear</button>
        </footer>

                  <p class="primary-text">
                    Vehículo
                  </p>
                </div>
                <div class="bottom-container client-data" style="padding-top: 0;">
                  <span><strong>Tipo: </strong>{tipoVehiculo}</span>
                  <span><strong>Número de placa: </strong>{placa}</span>
                  <span><strong>VIN: </strong>{numeroChasis}</span>
                  <span><strong>Año: </strong>{anioVehiculo}</span>
                  <span><strong>Color: </strong>{color}</span>
                  <span><strong>Marca: </strong>{marcaVehiculo}</span>
                  <span><strong>Modelo: </strong>{modeloVehiculo}</span>
                  <span><strong>Marca otros: </strong>{marcaOtros}</span>
                  <span><strong>Modelo otros: </strong>{modeloOtros}</span>
                </div>
              </div>

            </div>
          </div>
        </div>
        <footer style="border-bottom-left-radius: 10px; border-bottom-right-radius: 10px;" class="slds-modal__footer">
          <button class="slds-button slds-button_neutral" disabled={urlExiste} onclick={irAevento} title="Ir a Cita">Ir
            a
            cita creada</button>
          <button class="slds-button slds-button_brand" onclick={irAcalendario} title="Crear nueva cita">Crear nueva
            cita</button>
        </footer>
      </div>

      <!-- </div> -->
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
  </template>

  <!-- Error al crear cita -->
  <template if:true={errCrearCita}>
    <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-06" aria-modal="true"
      aria-describedby="modal-content-id-6" class="slds-modal slds-fade-in-open">
      <div class="slds-modal__container">
        <header style="border-top-left-radius: 10px; border-top-right-radius: 10px;"
          class="slds-modal__header top-container">
          <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Cerrar"
            onclick={handleCloseErrModal}>
            <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse"
              size="small"></lightning-icon>
            <span class="slds-assistive-text">Cerrar</span>
          </button>
          <lightning-icon class="icon-ctct" icon-name="standard:customers" alternative-text="Email"
            title="Email"></lightning-icon>
          <h2 id="modal-heading-06" class="slds-text-heading_medium slds-hyphenate">Ocurrió un error al crear la cita
          </h2>
        </header>

        <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-6">
          <div class="info-data-container">
            <div class="bottom-container client-data" style="align-items: stretch;">
              <p class="slds-text-heading_medium slds-m-bottom_medium">Intente nuevamente</p>
            </div>
          </div>
        </div>

        <footer style="border-bottom-left-radius: 10px; border-bottom-right-radius: 10px;" class="slds-modal__footer">
          <button class="slds-button slds-button_neutral" title="Regresar"
            onclick={handleCloseErrModal}>Anterior</button>
          <button class="slds-button slds-button_brand" title="Confirmar" onclick={crearEvento}>Volver a
            intentar</button>
        </footer>
      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
  </template>

  <template if:true={campaniasTec}>
    <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-07" aria-modal="true"
      aria-describedby="modal-content-id-7" class="slds-modal slds-fade-in-open">
      <div class="slds-modal__container">
        <header style="border-top-left-radius: 10px; border-top-right-radius: 10px;"
          class="slds-modal__header top-container">
          <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Cerrar"
            onclick={closeCampTec}>
            <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse"
              size="small"></lightning-icon>
            <span class="slds-assistive-text">Cerrar</span>
          </button>
          <lightning-icon class="icon-ctct" icon-name="standard:service_request_detail" alternative-text="Email"
            title="Email"></lightning-icon>
          <h2 id="modal-heading-07" class="slds-text-heading_medium slds-hyphenate">Campañas técnicas activas</h2>
        </header>

        <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-7">

          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Nombre</th>
                  <th>Categoría</th>
                  <th>Descripción</th>
                  <th>Activa</th>
                </tr>
              </thead>
              <tbody>
                <template for:each={campanias} for:item="campania">
                  <tr key={campania.Id} class="slds-hint-parent">
                    <td data-label="Nombre">{campania.Name}</td>
                    <td data-label="Categoría">{campania.Categoria__c}</td>
                    <td data-label="Descripción">{campania.Descripcion__c}</td>
                    <td data-label="Activa">
                      <span class="active">
                        Sí
                      </span>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>

        <footer style="border-bottom-left-radius: 10px; border-bottom-right-radius: 10px;" class="slds-modal__footer">
          <button class="slds-button slds-button_destructive" onclick={closeCampTec} title="Siguiente">Cerrar</button>
          <button class="slds-button slds-button_brand" onclick={handleConfirmacion} title="Siguiente">Confirmación de
            lectura</button>
        </footer>

      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
  </template>

</template>
