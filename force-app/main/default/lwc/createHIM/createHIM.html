<!--
  @description       : Componente para registrar tiempos improducivos desde la pantalla de Asignación de mecánico
  @author            : marcohernandezhp@gmail.com
  @group             : 
  @last modified on  : 05-17-2023
  @last modified by  : marcohernandezhp@gmail.com
-->
<template>
    <div>
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </template>        
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <lightning-record-edit-form object-api-name='Horas_improductivas_por_mec_nico__c' onsuccess={handleSuccessEvent} onsubmit={handleSubmitEvent}>
                    <lightning-messages></lightning-messages>

                    <template if:true={isLoading}>
                        <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                    </template>

                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            title="Close" onclick={closeModal}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse"
                                size="small"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 class="slds-text-heading_medium slds-hyphenate">Registrar tiempo improductivo
                        </h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <div class="slds-form" role="list">                        

                            <div class="slds-form__row">
                                <div class="slds-form__item" role="listitem">
                                    <div class="slds-form-element slds-form-element_stacked">                                    
                                        <div class="slds-form-element__control">
                                            <lightning-input-field field-name="Mecanico__c"  required="true"></lightning-input-field>
                                        </div>
                                    </div>
                                </div> 
                                <div class="slds-form__item" role="listitem">
                                    <div class="slds-form-element slds-form-element_stacked">                                    
                                        <div class="slds-form-element__control">
                                            <lightning-input-field field-name="Tipo_de_Trabajo__c"  required="true"></lightning-input-field>                                  
                                        </div>
                                    </div>
                                </div>                                                                         
                                <div class="slds-form__item" role="listitem">
                                    <div class="slds-form-element slds-form-element_stacked">                                    
                                        <div class="slds-form-element__control">                                        
                                            <lightning-input-field field-name="Inicio__c" required="true"></lightning-input-field>
                                        </div>
                                    </div>
                                </div>
                                <div class="slds-form__item" role="listitem">
                                    <div class="slds-form-element slds-form-element_stacked">                                    
                                        <div class="slds-form-element__control">                                        
                                            <lightning-input-field field-name="Fin__c" required="true"></lightning-input-field>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="slds-form__item" role="listitem">
                                    <div class="slds-form-element slds-form-element_stacked">                                    
                                        <div class="slds-form-element__control">      
                                            <lightning-input-field field-name="Hora_inicio__c" required="true"></lightning-input-field>                                  
                                        </div>
                                    </div>
                                </div> 
                                <div class="slds-form__item" role="listitem">
                                    <div class="slds-form-element slds-form-element_stacked">                                    
                                        <div class="slds-form-element__control">                
                                            <lightning-input-field field-name="Hora_fin__c" required="true"></lightning-input-field>                        
                                        </div>
                                    </div>
                                </div> 
                                
                                <div class="slds-form__item" role="listitem">
                                    <div class="slds-form-element slds-form-element_stacked">                                    
                                        <div class="slds-form-element__control">  
                                            <lightning-input-field field-name="Se_repite__c" required="true"></lightning-input-field>                                      
                                        </div>
                                    </div>
                                </div> 
                                <div class="slds-form__item" role="listitem">
                                    <div class="slds-form-element slds-form-element_stacked">                                    
                                        <div class="slds-form-element__control">                                              
                                        </div>
                                    </div>
                                </div>                             
                                
                            </div> 
                                                                                                                                                                                                
                            <lightning-input-field field-name="Observaciones__c" required="true"></lightning-input-field>
        
                        </div>
                    </div>
                    <footer class="slds-modal__footer">                        
                        <lightning-button label="Cancelar"  onclick={closeModal} class="slds-m-right_medium"></lightning-button>
                        <lightning-button label="Aceptar" type="submit" variant="brand"></lightning-button>
                    </footer>
                </lightning-record-edit-form>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>    
    </div>
</template>
