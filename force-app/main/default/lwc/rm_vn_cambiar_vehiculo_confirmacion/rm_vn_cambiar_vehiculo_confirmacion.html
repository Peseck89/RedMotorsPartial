<template>
    <article class="slds-card">
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </template>
        
        <div class="slds-card__header slds-grid">
            <header class="slds-media slds-media_center slds-has-flexi-truncate">
                <div class="slds-media__figure">
                </div>
                <div class="slds-media__body">
                    <h2 class="slds-card__header-title">
                        <span>Confirmación de cambio de vehiculo</span>
                    </h2>
                </div>
            </header>
        </div>
        <div class="slds-card__body">
            <div class="slds-p-around_medium">
                <h1 class="slds-text-heading_medium">Vehiculo Actual</h1>
                <lightning-datatable max-row-selection="1" key-field="Id" data={selectedVehicle} columns={columns} hide-checkbox-column="true">
                </lightning-datatable>
                <br/>                
                <h1 class="slds-text-heading_medium">Nuevo Vehiculo</h1>
                <lightning-datatable max-row-selection="1" key-field="Id" data={selectedInventory} columns={columns} hide-checkbox-column="true">
                </lightning-datatable>
            </div>

        </div>
        <footer class="slds-card__footer" style="display: flex;justify-content: space-between;">
            <div>
            </div>
            <div>
                <lightning-button variant="brand-outline" label="Atras" title="Atras" onclick={handleGoBackClick}
                    class="slds-m-left_small"></lightning-button>

                <lightning-button variant="brand" label="Continuar" title="Continuar" disabled={disableNextButton}
                    onclick={handleNextStepClick} class="slds-m-left_x-small"></lightning-button>
            </div>
        </footer>
    </article>
</template>
