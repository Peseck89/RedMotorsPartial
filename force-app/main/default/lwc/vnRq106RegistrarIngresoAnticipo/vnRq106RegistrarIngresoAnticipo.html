<template>
    <lightning-card title="Registrar ingreso / anticipo">
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Cargando" size="medium"></lightning-spinner>
        </template>

        <div class="modal-body slds-p-around_medium">
            <template if:true={loadError}>
                <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_medium" role="alert">
                    <span class="slds-assistive-text">Error</span>
                    <h2>{loadError}</h2>
                </div>
            </template>

            <template if:true={context}>
                <section class="section">
                    <div class="section-header">
                        <h2 class="section-title">Datos de oportunidad</h2>
                    </div>
                    <dl class="summary-grid">
                        <div class="summary-item">
                            <dt>Nombre</dt>
                            <dd>{context.opportunityName}</dd>
                        </div>
                        <div class="summary-item">
                            <dt>Cliente</dt>
                            <dd>{displayAccountName}</dd>
                        </div>
                        <div class="summary-item">
                            <dt>Asesor</dt>
                            <dd>{displayOwnerName}</dd>
                        </div>
                        <div class="summary-item">
                            <dt>Record type</dt>
                            <dd>{displayRecordType}</dd>
                        </div>
                    </dl>
                </section>
            </template>

            <section class="section">
                <div class="section-header">
                    <h2 class="section-title">Datos de solicitud</h2>
                </div>
                <div class="form-grid">
                    <lightning-combobox
                        data-field="tipoIngreso"
                        data-required="true"
                        label="Tipo de ingreso"
                        value={form.tipoIngreso}
                        options={tipoIngresoOptions}
                        required
                        onchange={handleFieldChange}>
                    </lightning-combobox>

                    <lightning-input
                        data-field="monto"
                        data-required="true"
                        type="number"
                        step="0.01"
                        label="Monto"
                        value={form.monto}
                        required
                        onchange={handleFieldChange}>
                    </lightning-input>

                    <lightning-combobox
                        data-field="medioPago"
                        data-required="true"
                        label="Medio de pago"
                        value={form.medioPago}
                        options={medioPagoOptions}
                        required
                        onchange={handleFieldChange}>
                    </lightning-combobox>

                    <lightning-input
                        data-field="fechaIngreso"
                        data-required="true"
                        type="date"
                        label="Fecha de ingreso"
                        value={form.fechaIngreso}
                        required
                        onchange={handleFieldChange}>
                    </lightning-input>

                    <lightning-input
                        data-field="referenciaComprobante"
                        data-required="true"
                        type="text"
                        label="Referencia / comprobante"
                        value={form.referenciaComprobante}
                        required
                        onchange={handleFieldChange}>
                    </lightning-input>

                    <lightning-input
                        type="text"
                        label="Moneda"
                        value={displayCurrencyIsoCode}
                        read-only>
                    </lightning-input>

                    <lightning-input
                        data-field="depositante"
                        type="text"
                        label="Depositante"
                        value={form.depositante}
                        onchange={handleFieldChange}>
                    </lightning-input>

                    <lightning-input
                        data-field="identificacionDepositante"
                        type="text"
                        label="Identificación depositante"
                        value={form.identificacionDepositante}
                        onchange={handleFieldChange}>
                    </lightning-input>

                    <template if:true={isReservaVehiculo}>
                        <template if:true={hasVehicleOptions}>
                            <lightning-combobox
                                data-field="productoId"
                                data-required="true"
                                label="Vehículo"
                                value={form.productoId}
                                options={productOptions}
                                placeholder="Seleccione un vehículo"
                                required
                                onchange={handleFieldChange}>
                            </lightning-combobox>
                        </template>
                        <template if:true={hasNoVehiclesForReserva}>
                            <div class="full-width">
                                <div class="slds-notify slds-notify_alert slds-alert_warning notice" role="alert">
                                    <span class="slds-assistive-text">Advertencia</span>
                                    <h2>{noVehiclesMessage}</h2>
                                </div>
                            </div>
                        </template>
                    </template>

                    <lightning-textarea
                        class="full-width"
                        data-field="comentariosAsesor"
                        label="Comentarios asesor"
                        value={form.comentariosAsesor}
                        onchange={handleFieldChange}>
                    </lightning-textarea>
                </div>

                <div class="section-actions">
                    <lightning-button
                        variant="brand"
                        label="Guardar borrador"
                        onclick={handleSaveDraft}
                        disabled={isSaveDisabled}>
                    </lightning-button>
                </div>
            </section>

            <template if:true={createdAnticipoId}>
                <section class="section">
                    <div class="section-header">
                        <h2 class="section-title">Evidencia</h2>
                    </div>
                    <div class="evidence-panel">
                        <lightning-file-upload
                            name="evidenciaUploader"
                            label="Adjuntar evidencia"
                            record-id={createdAnticipoId}
                            disabled={isUploadDisabled}
                            onuploadfinished={handleUploadFinished}
                            multiple>
                        </lightning-file-upload>

                        <template if:true={uploadedFileNames}>
                            <p class="file-list">Archivos cargados: {uploadedFileNames}</p>
                        </template>
                    </div>
                </section>

                <section class="section">
                    <div class="section-header">
                        <h2 class="section-title">Estado / envío a Tesorería</h2>
                    </div>
                    <dl class="status-grid">
                        <div class="status-item">
                            <dt>Borrador creado</dt>
                            <dd>{createdAnticipoId}</dd>
                        </div>
                        <template if:true={createdAnticipoStatus}>
                            <div class="status-item">
                                <dt>Estatus</dt>
                                <dd>{createdAnticipoStatus}</dd>
                            </div>
                        </template>
                    </dl>

                    <div class="section-actions">
                        <lightning-button
                            variant="brand"
                            label="Enviar a Tesorería"
                            onclick={handleSendToTreasury}
                            disabled={isSendToTreasuryDisabled}>
                        </lightning-button>
                    </div>
                </section>
            </template>
        </div>
    </lightning-card>
</template>
