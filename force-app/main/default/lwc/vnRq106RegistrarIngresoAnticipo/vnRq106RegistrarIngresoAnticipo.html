<template>
    <lightning-card title="Registrar ingreso / anticipo">
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Cargando" size="medium"></lightning-spinner>
        </template>

        <div class="slds-p-around_medium">
            <template if:true={loadError}>
                <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_medium" role="alert">
                    <span class="slds-assistive-text">Error</span>
                    <h2>{loadError}</h2>
                </div>
            </template>

            <template if:true={context}>
                <section class="section">
                    <h2 class="slds-text-heading_small slds-m-bottom_small">Oportunidad</h2>
                    <dl class="summary-grid">
                        <div>
                            <dt>Nombre</dt>
                            <dd>{context.opportunityName}</dd>
                        </div>
                        <div>
                            <dt>Cliente</dt>
                            <dd>{displayAccountName}</dd>
                        </div>
                        <div>
                            <dt>Asesor</dt>
                            <dd>{displayOwnerName}</dd>
                        </div>
                        <div>
                            <dt>Record type</dt>
                            <dd>{displayRecordType}</dd>
                        </div>
                    </dl>
                </section>
            </template>

            <section class="section">
                <h2 class="slds-text-heading_small slds-m-bottom_small">Solicitud</h2>
                <div class="form-grid">
                    <lightning-combobox
                        data-field="tipoIngreso"
                        data-required="true"
                        label="Tipo de ingreso"
                        value={form.tipoIngreso}
                        options={tipoIngresoOptions}
                        required
                        onchange={handleFieldChange}>
                    </lightning-combobox>

                    <lightning-input
                        data-field="monto"
                        data-required="true"
                        type="number"
                        step="0.01"
                        label="Monto"
                        value={form.monto}
                        required
                        onchange={handleFieldChange}>
                    </lightning-input>

                    <lightning-combobox
                        data-field="medioPago"
                        data-required="true"
                        label="Medio de pago"
                        value={form.medioPago}
                        options={medioPagoOptions}
                        required
                        onchange={handleFieldChange}>
                    </lightning-combobox>

                    <lightning-input
                        data-field="fechaIngreso"
                        data-required="true"
                        type="date"
                        label="Fecha de ingreso"
                        value={form.fechaIngreso}
                        required
                        onchange={handleFieldChange}>
                    </lightning-input>

                    <lightning-input
                        data-field="referenciaComprobante"
                        data-required="true"
                        type="text"
                        label="Referencia / comprobante"
                        value={form.referenciaComprobante}
                        required
                        onchange={handleFieldChange}>
                    </lightning-input>

                    <lightning-input
                        data-field="depositante"
                        type="text"
                        label="Depositante"
                        value={form.depositante}
                        onchange={handleFieldChange}>
                    </lightning-input>

                    <lightning-input
                        data-field="identificacionDepositante"
                        type="text"
                        label="Identificación depositante"
                        value={form.identificacionDepositante}
                        onchange={handleFieldChange}>
                    </lightning-input>

                    <template if:true={isReservaVehiculo}>
                        <lightning-combobox
                            data-field="productoId"
                            data-required="true"
                            label="Vehículo"
                            value={form.productoId}
                            options={productOptions}
                            placeholder="Seleccione un vehículo"
                            required
                            onchange={handleFieldChange}>
                        </lightning-combobox>
                    </template>
                </div>

                <lightning-textarea
                    class="slds-m-top_medium"
                    data-field="comentariosAsesor"
                    label="Comentarios asesor"
                    value={form.comentariosAsesor}
                    onchange={handleFieldChange}>
                </lightning-textarea>
            </section>

            <div class="slds-m-top_medium actions">
                <lightning-button
                    variant="brand"
                    label="Guardar borrador"
                    onclick={handleSaveDraft}
                    disabled={isSaveDisabled}>
                </lightning-button>
            </div>

            <template if:true={createdAnticipoId}>
                <section class="section slds-m-top_large">
                    <h2 class="slds-text-heading_small slds-m-bottom_small">Evidencia</h2>
                    <p class="slds-m-bottom_small">
                        Borrador creado: <strong>{createdAnticipoId}</strong>
                    </p>
                    <template if:true={createdAnticipoStatus}>
                        <p class="slds-m-bottom_small">
                            Estatus: <strong>{createdAnticipoStatus}</strong>
                        </p>
                    </template>
                    <lightning-file-upload
                        name="evidenciaUploader"
                        label="Adjuntar evidencia"
                        record-id={createdAnticipoId}
                        disabled={isUploadDisabled}
                        onuploadfinished={handleUploadFinished}
                        multiple>
                    </lightning-file-upload>

                    <template if:true={uploadedFileNames}>
                        <p class="slds-m-top_small">Archivos cargados: {uploadedFileNames}</p>
                    </template>

                    <div class="slds-m-top_medium actions">
                        <lightning-button
                            variant="brand"
                            label="Enviar a Tesorería"
                            onclick={handleSendToTreasury}
                            disabled={isSendToTreasuryDisabled}>
                        </lightning-button>
                    </div>
                </section>
            </template>
        </div>
    </lightning-card>
</template>
