<template>
  <!-- Search View -->
  <div if:true={isSearchView} class="cust-body slds-card">
    <div class="custom-header slds-card__header slds-grid">
      <header class="slds-media slds-media_center slds-has-flexi-truncate">
        <div class="slds-media__body">
          <h2 class="slds-card__header-title" style="font-size: 30px;">
            <span>Consulta de Vehículo</span>
          </h2>
          <p class="slds-text-body_small">Ingrese el número de placa para consultar los datos del vehículo</p>
        </div>
      </header>
    </div>
    <div class="form-body">
      <label class="slds-form-element__label" for="licensePlate">Número de Placa</label>
      <div class="slds-grid slds-gutters" style="align-items: flex-end">
        <div class="slds-col slds-size_3-of-4 form-cust">
          <lightning-combobox name="tipoVehiculo" value={vehiValue} placeholder="Tipo de vehículo" options={options}
            onchange={handleVhiChange} style="margin-bottom: -2px; width: 35%;"></lightning-combobox>
          <input type="text" id="licensePlate" class="slds-input" placeholder="Ej. ABC123"
            onchange={handleLicensePlateChange} />
        </div>
        <div class="butons-container">
          <button class="slds-button slds-button_brand slds-button_stretch" onclick={handleSearch} disabled={isLoading}>
            {searchButtonLabel}
            <lightning-icon if:false={isLoading} icon-name="standard:search" size="x-small"
              class="slds-m-left_x-small"></lightning-icon>
          </button>
        </div>
      </div>
      <!-- <div if:true={error} class="slds-text-color_error slds-p-top_x-small">{error}</div> -->
    </div>
  </div>

  <!-- Vehicle Details View -->
  <div if:true={isDetailsView} class="cust-body slds-card">

          <h2 class="slds-card__header-title" style="font-size: 30px;">
            <span>Datos del Vehículo</span>
          </h2>
          <p class="slds-text-body_small">Información detallada del vehículo consultado</p>
        </div>
      </header>
    </div>
    <div class="vehicle-info-body slds-card__body slds-card__body_inner">
      <div class="slds-grid slds-wrap slds-gutters">
        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
          <div class="slds-form-element">
            <label class="slds-form-element__label cust-label">Placa</label>
            <div class="slds-form-element__static">{vehicleData.placa}</div>
          </div>
        </div>
        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
          <div class="slds-form-element">
            <label class="slds-form-element__label cust-label">Número VIN</label>
            <div class="slds-form-element__static">{vehicleData.numeroVin}</div>
          </div>
        </div>
        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
          <div class="slds-form-element">
            <label class="slds-form-element__label cust-label">Marca</label>
            <div class="slds-form-element__static">{vehicleData.marca}</div>
          </div>
        </div>
        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
          <div class="slds-form-element">
            <label class="slds-form-element__label cust-label">Modelo</label>
            <div class="slds-form-element__static">{vehicleData.modelo}</div>
          </div>
        </div>
        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
          <div class="slds-form-element">
            <label class="slds-form-element__label cust-label">Año</label>
            <div class="slds-form-element__static">{vehicleData.anio}</div>
          </div>
        </div>
        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
          <div class="slds-form-element">
            <label class="slds-form-element__label cust-label">Tracción</label>
            <div class="slds-form-element__static">{vehicleData.traccion}</div>
          </div>
        </div>
        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
          <div class="slds-form-element">
            <label class="slds-form-element__label cust-label">Carrocería</label>
            <div class="slds-form-element__static">{vehicleData.carroceria}</div>
          </div>
        </div>
        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">

        </div>
        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">

        </div>
        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">

        </div>

        </div>

      </div>

        <div class="slds-form-element">

          </div>
        </div>
        </template>

        </template>
      </div> -->

  <template if:true={showMissingFieldsModal}>
    <section class="slds-modal slds-fade-in-open slds-modal_medium" role="dialog">
      <div class="slds-modal__container">
        <header class="slds-modal__header">
          <h2 class="slds-modal__title slds-hyphenate">Campos Obligatorios Faltantes</h2>
        </header>
        <div class="slds-modal__content slds-p-around_medium">
          <p>Por favor complete los siguientes campos obligatorios:</p>
          <div class="slds-form slds-form_stacked">
            <template for:each={missingFields} for:item="field">
              <div key={field.name} class="slds-form-element slds-m-top_medium">
                <label class="slds-form-element__label" for={field.name}>
                  {field.label}
                </label>
                <div class="slds-form-element__control">
                  <template if:true={field.isText}>
                    <input type="text" id={field.name} class="slds-input" data-field={field.name}
                      onchange={handleMissingFieldChange} maxlength={field.maxlength} required
                       />
                  </template>
  
                  <template if:true={field.isNumber}>
                    <input type="number" id={field.name} class="slds-input" data-field={field.name}
                      onchange={handleMissingFieldChange} min={field.min} max={field.max} required
                       />
                  </template>
  
                  <template if:true={field.isPicklist}>
                    <select id={field.name} class="slds-select" data-field={field.name}
                      onchange={handleMissingFieldChange} required>
                      <option value="">Seleccione una opción</option>
                      <template for:each={field.options} for:item="option">
                        <option key={option.value} value={option.value}>
                          {option.label}
                        </option>
                      </template>
                    </select>
                  </template>
                  
                </div>
              </div>
            </template>
          </div>
        </div>
        <footer class="slds-modal__footer">
          <button class="slds-button slds-button_neutral" onclick={handleCancelMissingFields}>
            Cancelar
          </button>
          <button class="slds-button slds-button_brand" onclick={handleSaveMissingFields}>
            Continuar
          </button>
        </footer>
      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
  </template>

  <template if:true={infoModal}>
    <section class="slds-modal slds-fade-in-open slds-modal_medium" role="dialog">
      <div class="slds-modal__container">
        <header class="slds-modal__header">

        </header>
        <div class="slds-modal__content slds-p-around_medium">
          <p>En la siguiente pantalla podrá agregar los archivos adjuntos del avalúo</p>
          <div class="slds-form slds-form_stacked">
            <img src={saveFilesAv} style="width: 100%;"/>
          </div>
        </div>
        <footer class="slds-modal__footer">
          <button class="slds-button slds-button_brand" onclick={handleInfoModalClose}>
            Cancelar
          </button>
          <button class="slds-button slds-button_brand" onclick={handleSaveAppraisal}>
            Continuar
          </button>
        </footer>
      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
  </template>

</template>
