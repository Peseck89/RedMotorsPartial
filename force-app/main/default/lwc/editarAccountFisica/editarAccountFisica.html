<template>
    <div class="grid-container">
        <div style="margin-bottom:20px" class="info-data-container">
            <div class="top-container">
                <lightning-icon class="icon-ctct" icon-name="standard:account" alternative-text="Cuenta"
                    title="Cuenta"></lightning-icon>
                <p class="primary-text">Edición de cuenta física</p>
            </div>

            <div class="bottom-container client-data">
                <div class="create-account-body">
                    <template if:true={isLoading}>
                        <lightning-spinner alternative-text="Cargando..." size="medium"></lightning-spinner>
                    </template>

                    <div class="slds-grid slds-wrap slds-gutters">
                        <div class="slds-col slds-size_1-of-2">
                            <lightning-input 
                            disabled={puedeEditarCedula}
                                type="number"
                                name="cedula"
                                label="*Cédula"                                                                
                                value={cedula}
                                minlength="9"
                                max-length="12"
                                onchange={handleInputChange}
                                message-when-pattern-mismatch="Solo números de hasta 12 dígitos."
                                pattern="[0-9]{9,12}">
                            </lightning-input>
                        </div>

                        <div class="slds-col slds-size_1-of-2">
                            <lightning-combobox name="pais" label="*País de Origen" value={pais}
                            options={paisOptions}
                                onchange={handlePaisChange}></lightning-combobox>

                            <!-- <lightning-input name="pais" label="*País de Origen" value={pais}
                                onchange={handleInputChange}></lightning-input> -->
                        </div>

                        <div class="slds-col slds-size_1-of-2">
                            <lightning-input type="text" name="firstName"  disabled={puedeEditarCedula} label="*Primer Nombre" value={firstName}
                            onchange={handleInputChange}></lightning-input>
                        </div>

                        <div class="slds-col slds-size_1-of-2">
                            <lightning-input type="text" name="secondName" disabled={puedeEditarCedula} label="*Segundo Nombre" value={secondName}
                            onchange={handleInputChange}></lightning-input>
                        </div>

                        <div class="slds-col slds-size_1-of-2">
                            <lightning-input type="text" name="lastName"  disabled={puedeEditarCedula} label="*Apellido" value={lastName}
                            onchange={handleInputChange}></lightning-input>
                        </div>

                        <div class="slds-col slds-size_1-of-2">
                            <lightning-combobox name="genero" label="*Género" value={genero} options={generoOptions}
                                onchange={handleInputChange}>
                            </lightning-combobox>
                        </div>

                        <div class="slds-col slds-size_1-of-2">
                            <lightning-input name="fechaNacimiento" type="date" label="*Fecha de Nacimiento"
                                value={fechaNacimiento} onchange={handleInputChange}></lightning-input>
                        </div>

                        <div class="slds-col slds-size_1-of-2">
                            <lightning-combobox name="profesion" label="*Profesión" value={profesion}
                                options={profesionOptions} onchange={handleInputChange}>
                            </lightning-combobox>                
                        </div>

                        <div class="slds-col slds-size_1-of-2">
                            <lightning-combobox name="estadoCivil" label="*Estado Civil" value={estadoCivil}
                                options={estadoCivilOptions} onchange={handleInputChange}>
                            </lightning-combobox>
                        </div>
                        
                        <div class="slds-col slds-size_1-of-2">
                            <lightning-input type="text" 
                            label="*Actividad Comercial" 
                            value={actividadComercialName}
                            onchange={handleActividadSearch}
                            placeholder="Buscar actividad comercial...">
                            </lightning-input>

                            <template if:true={showActividadOptions}>
                                <div class="slds-box slds-m-top_x-small" style="max-height:150px; overflow:auto;">
                                    <template for:each={actividadOptions} for:item="opt">
                                        <div key={opt.Id}
                                            data-id={opt.Id}
                                            data-codigo={opt.Name}
                                            data-nombre={opt.Nombre_actividad_econ_mica__c}
                                            class="slds-p-around_x-small slds-item slds-hint-parent hover-option"
                                            style="cursor:pointer;"
                                            onclick={handleSelectActividad}>
                                            <strong>{opt.Name}</strong> - {opt.Nombre_actividad_econ_mica__c}
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>                        

                    </div>

                    <template if:true={mostrarError}>
                        <div class="slds-text-color_error slds-m-top_small">
                            <lightning-icon icon-name="utility:error" alternative-text="Error"
                                size="x-small"></lightning-icon>
                            <span> Faltan campos obligatorios </span>
                        </div>
                    </template>

                    <div class="slds-m-top_medium slds-grid slds-grid_align-end">
                        <lightning-button label="Guardar cambios" variant="brand"
                            onclick={handleGuardar}></lightning-button>
                    </div>
                    <template if:true={recordId}>
                        <div class="slds-m-top_large">
                            <br />
                            <c-identificacionesdecuenta account-id={recordId}  onactualizar={handleActualizacion}></c-identificacionesdecuenta>
                            <br />
                            <c-correosdecuenta account-id={recordId}  onactualizar={handleActualizacion}></c-correosdecuenta>
                            <br />
                            <c-direccionesdecuenta account-id={recordId}  onactualizar={handleActualizacion}></c-direccionesdecuenta>
                            <br />
                            <c-contactosrelacionadoscuenta account-id={recordId}  onactualizar={handleActualizacion}></c-contactosrelacionadoscuenta>
                            <br />
                            <c-telefonoscuenta account-id={recordId}  onactualizar={handleActualizacion}></c-telefonoscuenta>
                        </div>
                    </template>                       
                </div>
            </div>
        </div>
    </div>
</template>
