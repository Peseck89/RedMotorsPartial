<template>
  <div if:true={isSearchView} class="cust-body slds-card">
    <div class="custom-header slds-card__header slds-grid">
      <header class="slds-media slds-media_center slds-has-flexi-truncate">
        <div class="slds-media__body">
          <h2 class="slds-card__header-title" style="font-size: 30px;">
            <span>Consulta de Precios Sugeridos</span>
          </h2>
          <p class="slds-text-body_small">Ingrese el número de placa para consultar los datos del vehículo</p>
        </div>
      </header>
    </div>
    <div class="form-body">
      <label class="slds-form-element__label" for="licensePlate">Número de Placa</label>
      <div class="slds-grid slds-gutters" style="align-items: flex-end">
        <div class="slds-col slds-size_3-of-4 form-cust">
          <lightning-combobox name="tipoVehiculo" value={vehiValue} placeholder="Tipo de vehículo" options={options}
            onchange={handleVhiChange} style="margin-bottom: -2px; width: 35%;"></lightning-combobox>
          <input type="text" id="licensePlate" class="slds-input" placeholder="Ej. ABC123"
            onchange={handleLicensePlateChange} />
        </div>
        <div class="butons-container">
          <button class="slds-button slds-button_brand slds-button_stretch" onclick={handleSearch} disabled={isLoading}>
            {searchButtonLabel}
            <lightning-icon if:false={isLoading} icon-name="standard:search" size="x-small"
              class="slds-m-left_x-small"></lightning-icon>
          </button>
        </div>
      </div>
      <!-- <div if:true={error} class="slds-text-color_error slds-p-top_x-small">{error}</div> -->
    </div>
  </div>

  <div if:true={isDetailsView} class="cust-body slds-card">
    <div class="slds-card__header slds-grid">
      <header class="slds-media slds-media_center slds-has-flexi-truncate">
        <div class="slds-media__body">
          <h2 class="slds-card__header-title" style="font-size: 30px;">
            <span>Datos del Vehículo</span>
          </h2>
          <p class="slds-text-body_small">Información detallada del vehículo consultado</p>
        </div>
      </header>
    </div>
    <div class="vehicle-info-body slds-card__body slds-card__body_inner">
      <div class="slds-grid slds-wrap slds-gutters">
        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
          <div class="slds-form-element">
            <label class="slds-form-element__label cust-label">Placa</label>
            <div class="slds-form-element__static">{vehicleData.placa}</div>
          </div>
        </div>

        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
          <div class="slds-form-element">
            <label class="slds-form-element__label cust-label">Número VIN</label>
            <div class="slds-form-element__static">{vehicleData.numeroVin}</div>
          </div>
        </div>

        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
          <div class="slds-form-element">
            <label class="slds-form-element__label cust-label">Propietario</label>
            <div class="slds-form-element__static">{vehicleData.propietario}</div>
          </div>
        </div>

        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
          <div class="slds-form-element">
            <label class="slds-form-element__label cust-label">Número de Chasis</label>
            <div class="slds-form-element__static">{vehicleData.numeroChasis}</div>
          </div>
        </div>

        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
          <div class="slds-form-element">
            <label class="slds-form-element__label cust-label">Marca</label>
            <div class="slds-form-element__static">{vehicleData.marca}</div>
          </div>
        </div>

        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
          <div class="slds-form-element">
            <label class="slds-form-element__label cust-label">Modelo</label>
            <div class="slds-form-element__static">{vehicleData.modelo}</div>
          </div>
        </div>

        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
          <div class="slds-form-element">
            <label class="slds-form-element__label cust-label">Año</label>
            <div class="slds-form-element__static">{vehicleData.anio}</div>
          </div>
        </div>

        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
          <div class="slds-form-element">
            <label class="slds-form-element__label cust-label">Combustible</label>
            <div class="slds-form-element__static">{vehicleData.combustible}</div>
          </div>
        </div>

        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
          <div class="slds-form-element">
            <label class="slds-form-element__label cust-label">Tracción</label>
            <div class="slds-form-element__static">{vehicleData.traccion}</div>
          </div>
        </div>
        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
          <div class="slds-form-element">
            <label class="slds-form-element__label cust-label">Carrocería</label>
            <div class="slds-form-element__static">{vehicleData.carroceria}</div>
          </div>
        </div>

        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
          <div class="slds-form-element">
            <label class="slds-form-element__label cust-label">Categoría</label>
            <div class="slds-form-element__static">{vehicleData.categoria}</div>
          </div>
        </div>

        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
          <div class="slds-form-element">
            <label class="slds-form-element__label cust-label">Capacidad Personas</label>
            <div class="slds-form-element__static">{vehicleData.capacidadPersonas}</div>
          </div>
        </div>

        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
          <div class="slds-form-element">
            <label class="slds-form-element__label cust-label">Color</label>
            <div class="slds-form-element__static">{vehicleData.color}</div>
          </div>
        </div>

        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
          <div class="slds-form-element">
            <label class="slds-form-element__label cust-label">Cantidad Embargos</label>
            <div class="slds-form-element__static">{vehicleData.cantidadEmbargos}</div>
          </div>
        </div>


      </div>

      <div class="slds-col slds-size_1-of-1 slds-p-bottom_small">
        <!-- Nueva parte -->
        <div class="slds-col slds-size_1-of-1 slds-p-bottom_small">
          <div class="slds-form-element">
            <label class="slds-form-element__label cust-label">Registros Valor Sugerido del Sistema</label>
            <div class="slds-form-element__control">
              <table class="slds-table slds-table_bordered slds-table_cell-buffer">
                <thead>
                  <tr class="slds-text-title_caps">
                    <th scope="col">Marca</th>
                    <th scope="col">Modelo</th>
                    <th scope="col">Año</th>
                    <th scope="col">Combustible</th>
                    <th scope="col">Transmisión</th>
                    <th scope="col">Tracción</th>
                    <!-- <th scope="col">Registros</th> -->
                    <th scope="col">Valor Sugerido Sistema</th>
                  </tr>
                </thead>
                <tbody>
                  <template for:each={promediosList} for:item="prom">
                    <tr key={prom.Id} class="slds-hint-parent">
                      <td>{prom.Marca__c }</td>
                      <td>{prom.Modelo__c }</td>
                      <td>{prom.Anio_Number__c}</td>
                      <td>{prom.Combustible__c}</td>
                      <td>{prom.Transmision__c}</td>
                      <td>{prom.Traccion__c}</td>
                      <!-- <td>{prom.Cantidad_Registros__c}</td> -->
                      <td>
                        <strong>
                          <lightning-formatted-number value={prom.Promedio_Jefe_Usados__c} format-style="currency" currency-code="USD"
                            minimum-fraction-digits="0" maximum-fraction-digits="2">
                          </lightning-formatted-number>
                        </strong>
                      </td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>
        </div>

      </div>
    </div>
    <div class="slds-card__footer" style="width: 100%;">
      <div class="slds-grid slds-grid_align-end">
        <button class="slds-button slds-button_brand" onclick={handleBack}>
          <lightning-icon icon-name="utility:chevronleft" size="x-small" class="slds-m-left_x-small"></lightning-icon>
          Regresar
        </button>
      </div>
    </div>
  </div>
</template>
