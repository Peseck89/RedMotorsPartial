<template>
  <article class="slds-card">
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </template>

        <div class="slds-card__header slds-grid">
            <h2 class="slds-card__header-title">
                Anticipo confirmado
            </h2>
        </div>         

        <div class="slds-card__body slds-m-bottom_large slds-m-top_large">
            <lightning-layout vertical-align="center" class="x-large"  horizontal-align="space">
                <lightning-layout-item flexibility="auto" padding="around-small" size="4">                
                    <!-- <lightning-input type="text"  label="Identificador" value={identifier} disabled> </lightning-input>    -->
                    <p style="text-align: center;">
                        Identificador:
                        <br/>
                        <span style="font-weight: bold;">
                            {identifier}
                        </span>
                    </p>                              
                </lightning-layout-item>
            </lightning-layout>             
            <lightning-layout vertical-align="center" class="x-large"  horizontal-align="center">
                <lightning-layout-item flexibility="auto" padding="around-small" size="4">                
                    <!-- <lightning-input type="text"  label="El anticipo ingresado es valido y corresponde a:" value={amount} disabled> </lightning-input>  
                                                   -->
                    <p style="text-align: center;">El anticipo ingresado es valido y corresponde a:&#32;
                        <lightning-formatted-number value={amount} currency-code="USD" format-style="currency" minimum-significant-digits="2" disabled style="font-weight: bold;font-size: medium;">
                        </lightning-formatted-number>
                    </p>                            

                </lightning-layout-item>
            </lightning-layout>                      
        </div>
        <footer class="slds-card__footer" style="display: flex;justify-content: space-between;">
            <div></div> 
            <div>                                  
                <lightning-button label="Atras" title="Atras"
                    onclick={handleBackClick} class="slds-m-left_x-small"></lightning-button>                                                   
                <lightning-button variant="brand" label="Continuar" title="Continuar"
                    onclick={handleContinueClick} class="slds-m-left_x-small"></lightning-button>                                                   
            </div>               
        </footer>       
  </article> 
</template>
