<!-- sldsValidatorIgnore -->
<template>
    <!--Opportunity recordId is: {recId}-->
    <lightning-card>
    <template if:true={showSearchModal}>
            <!-- Modal/Popup Box LWC starts here -->
            <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-02" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open slds-modal_large">
                <div class="slds-modal__container"   style="width: 80%;" >
                    <!-- Modal/Popup Box LWC header here -->
                    <header class="slds-modal__header custom-error-header">
                        <h1 id="modal-heading-02" class="slds-text-heading_medium slds-hyphenate" style="padding-left: 20px;padding-right: 20px;"><b>Búsqueda detallada de Productos:</b></h1>
                    </header>
                    <!-- Modal/Popup Box LWC body starts here -->
                    <div class="slds-modal__content slds-p-around_medium" style="text-align: left;">
                        <template lwc:if={showDetailedSearch}>
                            <h3 slot="title">
                                <lightning-icon icon-name="standard:product" size="small"></lightning-icon> Búsqueda de Productos
                            </h3>
                            <lightning-layout multiple-rows>
                                <lightning-layout-item size="5" padding="slds-p-bottom_medium" style="height: 80px;">
                                    <div class=" slds-var-p-around_medium ">
                                        <p class="slds-var-p-horizontal_small">
                                            <lightning-input    type="search" 
                                                                class="slds-var-m-bottom_small" 
                                                                onchange={handleSearchProduct} 
                                                                value={productName}>
                                            </lightning-input>
                                        </p>
                                    </div>
                                </lightning-layout-item>
                            </lightning-layout>
                            <div style="display: flex;">
                                <div style="min-height: 10px; max-height: 500px; flex: 1;">
                                    <div class="slds-table_col-bordered slds-table_bordered" style="height: 100%;">
                                        <lightning-datatable 
                                            if:true={refreshTable}
                                            data={productList} 
                                            onrowselection={selectProducts}
                                            columns={cols} 
                                            key-field="ID"
                                            selected-rows={selectedRows}>
                                        </lightning-datatable>
                                    </div>
                                </div>
                            </div>
                        </template>
                        <template lwc:else>
                            <template lwc:if={showButtonPrice}>
                                <div lwc:if={productCodeSelected}><c-pricebook-reference-details product-code={productCodeSelected} empresa-factura={empresaFactura}></c-pricebook-reference-details></div>
                            </template>
                            <template lwc:if={showButtonLocation}>
                                <div lwc:if={productCodeSelected}><c-localizacion-details product-code={productCodeSelected} empresa-factura={empresaFactura}></c-localizacion-details></div>
                            </template>
                        </template>
                    </div>
                    <!-- Modal/Popup Box LWC footer starts here -->
                    <footer class="slds-modal__footer" style="text-align: center;">
                        <button  class="slds-button  slds-button_destructive" onclick={handleCancel} title="Cancel" disabled ={disableButtons}>Cancelar</button>
                        <button  class="slds-button  slds-button_brand" onclick={handleAddLines} title="Add Lines" disabled ={disableButtons}>Agregar Líneas</button>
                        <template lwc:if={showButtonPrice}>
                            <button  class="slds-button  slds-button_brand" onclick={handleShowPricebookTableToggle} title="handleShowPricebookTableToggle" disabled ={disablePriceRederence}>{toogleLabelPricebook}</button>
                        </template>
                        <template lwc:if={showButtonLocation}>
                            <button  class="slds-button  slds-button_brand" onclick={handleShowLocalizacionTableToggle} title="handleShowLocalizacionTableToggle" disabled ={disableLocalizaciones}>{toogleLabelLocation}</button>
                        </template>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
    </template>
</lightning-card>
</template>
