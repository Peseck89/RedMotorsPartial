<template>
    <div>
        <template if:true={isLoading}>
            <div>
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </div>
        </template>

        <div class="slds-page-header slds-page-header_record-home">
            <div class="slds-page-header__row">
                <div class="slds-page-header__col-title">
                    <div class="slds-media">
                        <div class="slds-media__figure">
                            <span class="slds-icon_container slds-icon-standard-opportunity">
                                <lightning-icon icon-name="standard:contract"
                                    alternative-text="Reporte tiempos improductivos"
                                    title="Reporte tiempos improductivos"></lightning-icon>
                            </span>
                        </div>
                        <div class="slds-media__body">
                            <div class="slds-page-header__name">
                                <div class="slds-page-header__name-title">
                                    <h1>
                                        <span>Reporte</span>
                                        <span class="slds-page-header__title slds-truncate"
                                            title="Reporte tiempos improductivos">Reporte tiempos improductivos</span>
                                    </h1>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="slds-page-header__col-actions">
                    <div class="slds-page-header__controls">
                        <div class="slds-page-header__control">
                            <ul class="slds-button-group-list">
                                <template if:true={isExportExcelAvailable}>
                                    <li>
                                        <lightning-button label="Exportar excel" title="Exportar a excel" onclick={handleExportClick} class="slds-m-left_x-small"></lightning-button>
                                    </li>
                                </template>
                                <li>
                                    <lightning-button-icon-stateful icon-name="utility:filterList"
                                        class="slds-m-left_xx-small" selected={showFilters}
                                        onclick={handleShowFiltersClick} alternative-text="Filtrar">
                                    </lightning-button-icon-stateful>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>                
            </div>            
        </div>

        <div class="slds-card slds-card slds-m-top_small">
            <template if:true={showFilters}>
                <lightning-layout class="slds-grid_align-center">
                    <!-- <lightning-layout-item flexibility="auto" padding="around-small">        
                                        
                        <lightning-dual-listbox name="territories"
                        label="Seleccionar territorios"
                        source-label="Disponibles"
                        selected-label="Seleccionados"
                        options={territories}
                        value={selectedTerritories}
                        onchange={handleTerritoryChange}></lightning-dual-listbox>
                    </lightning-layout-item> -->

                    <lightning-layout-item flexibility="auto" padding="around-small">
                        <c-lookup selection={mechanicInicialSelection} errors={errors} label="Seleccione el mecánico" onsearch={handleMechanicSearch} onselectionchange={handleMechanicSelectionChange} placeholder="Buscar ...">
                        </c-lookup>
                        
                        <lightning-input type="search" value={caseNumber}
                        placeholder="000000" label="Número de caso" minlength="8"
                        onchange={handleCaseNumberChange}> </lightning-input>
<!--                         
                        <lightning-input type="search" value={workOrderNumber}
                        placeholder="000000" label="Número de orden" minlength="8"
                        onchange={handleWorkOrderNumberChange}> </lightning-input>   -->

                    </lightning-layout-item>

                    <lightning-layout-item flexibility="auto" padding="around-small">
                        <lightning-input type="date" name="inputStartDate" label="Desde" value={startDate}
                            onchange={handleStarDateChange}></lightning-input>
                    </lightning-layout-item>

                    <lightning-layout-item padding="around-small">
                        <lightning-input class="inpHoy" type="date" name="inputEndDate" label="Hasta" value={endDate}
                            onchange={handleEndDateChange}></lightning-input>
                    </lightning-layout-item>

                    <lightning-layout-item padding="around-small" class="slds-m-top_xx-small">
                        <button class="slds-button slds-button_brand slds-m-top_medium" onclick={handleApplyFiltersClick} disabled={isApplybuttonEnabled}>Aplicar</button>
                        <button class="slds-button slds-button_neutral slds-m-top_medium" onclick={handleResetClick}>Limpiar filtros</button>
                    </lightning-layout-item>
                </lightning-layout>
            </template>

            <template if:false={showFilters}> 
                <template if:true={recordsFound}>
                    <table class="slds-table slds-no-row-hover slds-table_bordered slds-table_col-bordered"  aria-labelledby="element-with-table-label other-element-with-table-label">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th class="slds-text-align_center" scope="col">
                                    <div class="slds-truncate" title="Tecnico">Tecnico</div>
                                </th>
                                <!-- <th class="slds-text-align_center" style="width: 250px;">
                                    <div class="slds-truncate" title="Taller">Taller</div>
                                </th> -->
                                <th class="slds-text-align_center"  style="width: 200px;">
                                    <div class="slds-truncate" title="Num. OT"># Caso</div>
                                </th>
                                <!-- <th class="slds-text-align_center"  style="width: 200px;">
                                    <div class="slds-truncate" title="Num. OT">OT</div>
                                </th>                                 -->
                                <th class="slds-text-align_center" style="width: 200px;">
                                    <div class="slds-truncate" title="H. Asignadas">Tarea</div>
                                </th>
                                <th class="slds-text-align_center" style="width: 200px;">
                                    <div class="slds-truncate" title="H. Asignadas">Fecha inicio</div>
                                </th>                                
                                <th class="slds-text-align_center" style="width: 200px;">
                                    <div class="slds-truncate" title="H. Asignadas">Fecha fin</div>
                                </th>                                                                
                                <th class="slds-text-align_center" style="width: 200px;">
                                    <div class="slds-truncate" title="H.tardadas">Hora Inicio</div>
                                </th>
                                <th class="slds-text-align_center" style="width: 200px;">
                                    <div class="slds-truncate" title="H.tardadas">Hora Fin</div>
                                </th>                                
                                <th class="slds-text-align_center" style="width: 200px;">
                                    <div class="slds-truncate" title="H. Asignadas">Observaciones</div>
                                </th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={records} for:item="record">
                                <tr key={record.Id}>
                                    <td class="slds-text-align_center slds-border_right"><strong>{record.tecnico}</strong></td>
                                    <!-- <td class="slds-text-align_center slds-border_right">{record.taller}</td> -->
                                    <td class="slds-text-align_center slds-border_right">{record.caso}</td>
                                    <!-- <td class="slds-text-align_center slds-border_right">{record.orden}</td>                                     -->
                                    <td class="slds-text-align_center slds-border_right">{record.tarea}</td>
                                    <td class="slds-text-align_center slds-border_right">
                                        <lightning-formatted-date-time value={record.fechaInicio} year="numeric" month="numeric" day="numeric" hour="2-digit"
                                            minute="2-digit" time-zone="America/Costa_Rica"  hour12={ampm}></lightning-formatted-date-time>                                        
                                    </td>
                                    <td class="slds-text-align_center slds-border_right">                                        
                                        <lightning-formatted-date-time value={record.fechaFin} year="numeric" month="numeric" day="numeric" hour="2-digit"
                                            minute="2-digit" time-zone="America/Costa_Rica" hour12={ampm}></lightning-formatted-date-time>                                      
                                    </td>
                                    <td class="slds-text-align_center slds-border_right">{record.horaInicio}</td>                                    
                                    <td class="slds-text-align_center slds-border_right">{record.horaFin}</td>                                    
                                    <td class="slds-text-align_center slds-border_right">{record.observaciones}</td>                                    
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </template>

                <template if:false={recordsFound}>
                    <div class="slds-text-heading_medium slds-text-align_center slds-p-around_medium">
                        No se encontraron registros.
                    </div>
                </template> 
            </template>     
            
        </div>
    </div>
</template>
